<style>
*{box-sizing:border-box;margin:0;padding:0;}
.fsyne{font-family:'Trebuchet MS','Segoe UI',system-ui,sans-serif;}
:root{
  --c-light:#74AAFF;--c-deep:#285BB0;
  --bg:#1a2038;--bg-2:#222a47;--card:#262e52;--card-2:#2c3560;
  --border:#36406e;--border-soft:#2e3760;
  --txt:#eef1fb;--txt-2:#a4adcf;--txt-3:#6b74a0;
  --green:#3ECF8E;--amber:#F5C147;--red:#F47174;--purple:#A98BFF;--orange:#F2974D;
  --pink:#F58FC2;--pink-bg:rgba(245,143,194,.13);
  --r-sm:9px;--r:13px;--r-lg:18px;
}
html,body{height:100%;-webkit-text-size-adjust:100%;}
body{font-family:'Segoe UI',Roboto,system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--txt);font-size:14px;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
::-webkit-scrollbar{width:9px;height:9px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px;}
::-webkit-scrollbar-thumb:hover{background:#46508a;}
svg{display:block;}
.ico{display:inline-flex;vertical-align:-.18em;}

.bg-orbs{position:fixed;inset:0;z-index:-1;pointer-events:none;background:radial-gradient(520px 440px at 10% -5%,rgba(116,170,255,.12),transparent 62%),radial-gradient(500px 440px at 95% 105%,rgba(40,91,176,.16),transparent 62%);}

.loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:100;}
.loading-screen.hide{display:none;}
.spinner{width:38px;height:38px;border:3px solid var(--border);border-top-color:var(--c-light);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-screen p{color:var(--txt-2);font-size:13px;}

.shell{display:grid;grid-template-columns:236px 1fr;min-height:100vh;}
.shell.hide{display:none;}

.sidebar{background:rgba(22,27,52,.92);backdrop-filter:blur(14px);border-right:1px solid var(--border-soft);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;z-index:20;}
.logo{padding:24px 22px 18px;border-bottom:1px solid var(--border-soft);}
.logo-mark{font-family:'Trebuchet MS','Segoe UI',sans-serif;font-size:24px;font-weight:800;letter-spacing:-.02em;display:flex;align-items:center;}
.logo-mark .one{font-size:30px;color:var(--c-light);}
.logo-dot{width:7px;height:7px;border-radius:50%;background:var(--c-light);margin:0 4px 5px;}
.logo-sub{font-size:10px;color:var(--txt-3);letter-spacing:.16em;text-transform:uppercase;margin-top:5px;}
nav{padding:12px 11px;flex:1;display:flex;flex-direction:column;gap:2px;overflow-y:auto;}
.nav-item{display:flex;align-items:center;gap:11px;padding:11px 13px;font-size:13.5px;font-weight:500;color:var(--txt-2);cursor:pointer;border-radius:var(--r-sm);transition:all .15s;}
.nav-item:hover{color:var(--txt);background:var(--card);}
.nav-item.active{color:#fff;background:linear-gradient(135deg,var(--c-deep),var(--c-light));box-shadow:0 4px 16px rgba(116,170,255,.3);}
.nav-item .ico{flex-shrink:0;}
.nav-item .badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 5px;}
.nav-item.active .badge{background:rgba(255,255,255,.25);}
.side-foot{padding:14px 16px;border-top:1px solid var(--border-soft);display:flex;align-items:center;gap:11px;}
.avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--c-deep),var(--c-light));display:flex;align-items:center;justify-content:center;font-family:'Trebuchet MS',sans-serif;font-weight:700;font-size:14px;flex-shrink:0;}
.side-foot .nm{font-size:13px;font-weight:600;}
.side-foot .ur{font-size:11px;color:var(--txt-3);}

.main{display:flex;flex-direction:column;min-width:0;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:20px 30px;gap:14px;}
.topbar h1{font-family:'Trebuchet MS','Segoe UI',sans-serif;font-size:23px;font-weight:700;letter-spacing:-.02em;}
.topbar .sub{font-size:12px;color:var(--txt-2);margin-top:2px;}
.date-chip{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:9px 14px;flex-shrink:0;color:var(--c-light);}
.date-chip .d{font-size:12.5px;font-weight:600;text-transform:capitalize;color:var(--txt);}
.date-chip .t{font-size:10.5px;color:var(--txt-3);}
.scroll{flex:1;padding:4px 30px 60px;}
.tab{display:none;animation:fade .32s ease;}
.tab.active{display:block;}
@keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}

.row-head{display:flex;align-items:center;justify-content:space-between;margin:24px 0 13px;gap:12px;flex-wrap:wrap;}
.row-head h2{font-family:'Trebuchet MS','Segoe UI',sans-serif;font-size:16px;font-weight:700;}
.row-head .meta{font-size:12px;color:var(--txt-3);}
.btn{display:inline-flex;align-items:center;gap:7px;font-family:'DM Sans';font-size:13px;font-weight:600;border:none;border-radius:var(--r-sm);padding:9px 15px;cursor:pointer;transition:all .15s;}
.btn-primary{background:linear-gradient(135deg,var(--c-deep),var(--c-light));color:#fff;box-shadow:0 4px 14px rgba(116,170,255,.3);}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(116,170,255,.42);}
.btn-ghost{background:var(--card);color:var(--txt-2);border:1px solid var(--border);}
.btn-ghost:hover{color:var(--txt);border-color:#46508a;}
.btn-sm{padding:6px 11px;font-size:12px;}
.btn-green{background:linear-gradient(135deg,#2c9d6c,#3ECF8E);color:#fff;}
input,select,textarea{font-family:'DM Sans';background:var(--bg-2);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--txt);font-size:13px;padding:10px 12px;outline:none;transition:border .15s;width:100%;}
input::placeholder,textarea::placeholder{color:var(--txt-3);}
input:focus,select:focus,textarea:focus{border-color:var(--c-light);}
select option{background:var(--bg-2);}
label{font-size:11px;font-weight:600;color:var(--txt-2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;display:block;}

.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(225px,1fr));gap:14px;}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:17px 18px;position:relative;overflow:hidden;}
.kpi .sem{position:absolute;top:16px;right:16px;width:11px;height:11px;border-radius:50%;}
.sem-g{background:var(--green);box-shadow:0 0 8px rgba(62,207,142,.6);}
.sem-a{background:var(--amber);box-shadow:0 0 8px rgba(245,193,71,.6);}
.sem-r{background:var(--red);box-shadow:0 0 8px rgba(244,113,116,.6);}
.kpi .ic{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;margin-bottom:11px;background:rgba(116,170,255,.14);color:var(--c-light);}
.kpi .lbl{font-size:10.5px;color:var(--txt-2);text-transform:uppercase;letter-spacing:.06em;}
.kpi .val{font-family:'Trebuchet MS','Segoe UI',sans-serif;font-size:25px;font-weight:700;letter-spacing:-.03em;margin-top:3px;}
.kpi .trend{font-size:11px;margin-top:5px;display:flex;align-items:center;gap:4px;}
.trend.up{color:var(--green);}
.trend.down{color:var(--red);}
.trend.flat{color:var(--txt-3);}

.panel{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px;}
.empty{text-align:center;padding:34px;color:var(--txt-3);font-size:13px;}
.empty .ico{margin-bottom:10px;opacity:.5;}

.alert{display:flex;align-items:flex-start;gap:11px;padding:12px 15px;border-radius:var(--r);margin-bottom:9px;font-size:13px;border:1px solid;}
.alert .ico{flex-shrink:0;margin-top:1px;}
.alert.r{background:rgba(244,113,116,.09);border-color:rgba(244,113,116,.3);color:#ffb3b4;}
.alert.a{background:rgba(245,193,71,.09);border-color:rgba(245,193,71,.3);color:#ffe09a;}
.alert.g{background:rgba(62,207,142,.09);border-color:rgba(62,207,142,.3);color:#9ee9c5;}
.alert .at{font-weight:600;}
.alert .ad{color:var(--txt-2);font-size:12px;margin-top:1px;}

.chart-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px 20px;}
.chart-card .ch-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;flex-wrap:wrap;gap:8px;}
.chart-card .ch-title{font-family:'Syne';font-size:14px;font-weight:700;}
.seg{display:flex;background:var(--bg-2);border:1px solid var(--border);border-radius:var(--r-sm);padding:3px;gap:2px;flex-wrap:wrap;}
.seg button{background:transparent;border:none;color:var(--txt-2);font-family:'DM Sans';font-size:12px;font-weight:600;padding:6px 11px;border-radius:6px;cursor:pointer;transition:all .14s;white-space:nowrap;}
.seg button.on{background:linear-gradient(135deg,var(--c-deep),var(--c-light));color:#fff;}
.barRect{transition:opacity .15s;}
.barRect:hover{opacity:.8;}

.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:15px;}
.ccard{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:17px;position:relative;transition:transform .15s,border .15s;}
.ccard:hover{transform:translateY(-2px);border-color:#46508a;}
.ccard .bar{position:absolute;top:0;left:17px;right:17px;height:3px;border-radius:0 0 3px 3px;}
.ccard .top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;}
.cdot{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-family:'Syne';font-weight:700;font-size:14px;color:#fff;flex-shrink:0;}
.tag{font-size:9.5px;font-weight:700;padding:3px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:.04em;}
.tag.active{background:rgba(62,207,142,.15);color:var(--green);}
.tag.paused{background:rgba(245,193,71,.15);color:var(--amber);}
.tag.percent{background:rgba(169,139,255,.16);color:var(--purple);}
.tag.archived{background:rgba(107,116,160,.2);color:var(--txt-2);}
.cname{font-family:'Syne',sans-serif;font-size:21px;font-weight:800;letter-spacing:-.03em;line-height:1.12;cursor:pointer;}
.ctype{font-size:11.5px;color:var(--txt-3);margin-top:4px;}
.health-row{display:flex;align-items:center;gap:9px;margin-top:13px;}
.health-info .hl{font-size:10px;color:var(--txt-3);text-transform:uppercase;letter-spacing:.05em;}
.health-info .hv{font-family:'Syne';font-size:15px;font-weight:700;}
.cval-foot{margin-top:12px;padding-top:11px;border-top:1px solid var(--border-soft);display:flex;justify-content:space-between;font-size:11.5px;}
.cval-foot .cf-v{font-family:'Syne';font-weight:700;font-size:14px;}
.ccard-actions{display:flex;gap:6px;margin-top:11px;}
.iconbtn{width:30px;height:30px;border-radius:8px;background:var(--bg-2);border:1px solid var(--border);color:var(--txt-2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;}
.iconbtn:hover{color:var(--txt);border-color:#46508a;}
.iconbtn.danger:hover{color:var(--red);border-color:rgba(244,113,116,.4);}
.iconbtn.flex1{flex:1;width:auto;}
.add-card{border:1.5px dashed var(--border);background:transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--txt-3);cursor:pointer;min-height:200px;transition:all .15s;}
.add-card:hover{border-color:var(--c-light);color:var(--c-light);background:rgba(116,170,255,.04);}
.add-card span{font-size:12.5px;font-weight:600;}

.cd-back{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--txt-2);cursor:pointer;margin-bottom:14px;}
.cd-back:hover{color:var(--txt);}
.cd-hero{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:22px;display:flex;gap:18px;align-items:center;flex-wrap:wrap;}
.cd-hero .cdot{width:58px;height:58px;font-size:20px;border-radius:15px;}
.cd-hero .cd-name{font-family:'Syne';font-size:26px;font-weight:800;letter-spacing:-.03em;}
.cd-hero .cd-meta{font-size:12.5px;color:var(--txt-2);margin-top:3px;}
.cd-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:15px;margin-top:15px;}
.info-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border-soft);font-size:12.5px;gap:10px;}
.info-row:last-child{border:none;}
.info-row .k{color:var(--txt-3);}
.info-row .v{font-weight:600;text-align:right;}
.metric-card{background:var(--bg-2);border:1px solid var(--border);border-radius:var(--r);padding:13px 14px;}
.metric-card .mc-top{display:flex;justify-content:space-between;align-items:center;gap:8px;}
.metric-card .mc-name{font-size:11.5px;color:var(--txt-2);}
.metric-card .mc-val{font-family:'Syne';font-size:20px;font-weight:700;margin-top:3px;}
.lvl-pill{font-size:9.5px;font-weight:700;padding:3px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.03em;white-space:nowrap;}
.mc-note{font-size:10.5px;color:var(--txt-3);margin-top:5px;}
.access-item{display:flex;align-items:center;gap:10px;padding:9px 11px;background:var(--bg-2);border:1px solid var(--border);border-radius:var(--r-sm);margin-bottom:7px;font-size:12px;}
.access-item .ai-plat{font-weight:600;flex:1;}
.access-item .ai-cred{color:var(--txt-3);font-family:monospace;font-size:11px;}
.mini-del{color:var(--txt-3);cursor:pointer;}
.mini-del:hover{color:var(--red);}
.scope-head{font-family:'Syne';font-size:12px;font-weight:700;margin:14px 0 8px;color:var(--c-light);display:flex;align-items:center;gap:6px;}

/* CRM */
.pipe{display:flex;gap:13px;overflow-x:auto;padding-bottom:10px;-webkit-overflow-scrolling:touch;}
.pipe-col{background:linear-gradient(180deg,var(--card),var(--bg-2));border:1px solid var(--border);border-radius:var(--r-lg);padding:0;min-width:210px;flex:1;display:flex;flex-direction:column;overflow:hidden;}
.pipe-col-head{padding:13px 14px 11px;border-bottom:1px solid var(--border-soft);}
.pipe-col-head .pch{font-size:12px;font-weight:700;display:flex;align-items:center;gap:7px;}
.pch-dot{width:9px;height:9px;border-radius:50%;}
.pipe-col-sub{display:flex;justify-content:space-between;margin-top:6px;font-size:10.5px;color:var(--txt-3);}
.pipe-col-body{padding:11px;display:flex;flex-direction:column;gap:9px;flex:1;min-height:60px;}
.lead-card{background:var(--card-2);border:1px solid var(--border);border-radius:var(--r);padding:12px;cursor:grab;border-left:3px solid var(--c-light);transition:transform .12s,box-shadow .12s;}
.lead-card:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,.25);}
.lead-card .lc-name{font-size:13.5px;font-weight:700;}
.lead-card .lc-ch{font-size:10.5px;color:var(--txt-3);margin-top:3px;display:flex;align-items:center;gap:5px;}
.lead-card .lc-val{font-family:'Syne';font-size:15px;font-weight:700;color:var(--c-light);margin-top:7px;}
.lead-card .lc-foot{display:flex;justify-content:space-between;align-items:center;margin-top:9px;gap:6px;}
.lead-card .lc-acts{display:flex;gap:5px;}
.lc-mini{width:26px;height:26px;border-radius:7px;background:var(--bg-2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--txt-3);}
.lc-mini:hover{color:var(--txt);}
.lc-mini.del:hover{color:var(--red);}
.lead-card.dragging{opacity:.4;}
.pipe-col.dragover .pipe-col-body{background:rgba(116,170,255,.06);}
.stage-select{font-size:11px;padding:5px 7px;border-radius:6px;}

/* TASKS */
.tk-toolbar{display:flex;gap:9px;flex-wrap:wrap;align-items:center;}
.tk-toolbar input[type=text]{flex:1;min-width:160px;}
.tk-toolbar input,.tk-toolbar select{width:auto;}
.tlist{display:flex;flex-direction:column;gap:8px;}
.titem{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;transition:all .15s;}
.titem:hover{border-color:#46508a;}
.titem.done{opacity:.5;}
.titem.done .ttext{text-decoration:line-through;color:var(--txt-3);}
.titem.alert-crit{background:var(--pink-bg);border-color:rgba(245,143,194,.4);}
.titem.alert-crit .ttext{color:#ffd0e6;}
.tcheck{width:23px;height:23px;border-radius:7px;border:2px solid var(--border);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.tcheck:hover{border-color:var(--c-light);}
.tcheck.on{background:var(--green);border-color:var(--green);color:#0d1024;}
.prio{width:4px;align-self:stretch;border-radius:3px;flex-shrink:0;min-height:34px;}
.prio-alta{background:var(--red);}
.prio-media{background:var(--amber);}
.prio-baja{background:var(--txt-3);}
.prio-crit{background:var(--pink);}
.tbody{flex:1;min-width:0;}
.ttext{font-size:13.5px;}
.tsub{font-size:11px;color:var(--txt-3);margin-top:3px;display:flex;gap:9px;flex-wrap:wrap;align-items:center;}
.tsub .due-over{color:var(--red);font-weight:600;}
.tsub .due-soon{color:var(--amber);font-weight:600;}
.tmeta{display:flex;align-items:center;gap:7px;flex-shrink:0;}
.pill{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;}
.pill-alta{background:rgba(244,113,116,.15);color:var(--red);}
.pill-media{background:rgba(245,193,71,.15);color:var(--amber);}
.pill-baja{background:var(--bg-2);color:var(--txt-2);}
.pill-crit{background:rgba(245,143,194,.18);color:var(--pink);}
.pill-cli{background:var(--bg-2);color:var(--txt-2);border:1px solid var(--border);}
.tdel{color:var(--txt-3);cursor:pointer;}
.tdel:hover{color:var(--red);}

.tbl{width:100%;border-collapse:collapse;}
.tbl th{text-align:left;font-size:10.5px;font-weight:600;color:var(--txt-3);text-transform:uppercase;letter-spacing:.05em;padding:0 11px 11px;}
.tbl td{padding:12px 11px;border-top:1px solid var(--border-soft);font-size:12.5px;}
.tbl tr:hover td{background:rgba(255,255,255,.015);}
.legend-dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:8px;vertical-align:middle;}
.amount-pos{color:var(--green);font-weight:600;}
.amount-neg{color:var(--orange);font-weight:600;}
.st-pill{font-size:9.5px;font-weight:700;padding:3px 8px;border-radius:20px;}
.st-paid{background:rgba(62,207,142,.15);color:var(--green);}
.st-pend{background:rgba(245,193,71,.15);color:var(--amber);}

.prod-hero{display:grid;grid-template-columns:auto 1fr;gap:24px;align-items:center;}
.prod-score{text-align:center;}
.prod-score .ps-num{font-family:'Syne';font-size:54px;font-weight:800;line-height:1;letter-spacing:-.04em;}
.prod-score .ps-grade{font-size:13px;font-weight:700;margin-top:4px;text-transform:uppercase;letter-spacing:.05em;}
.prod-stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px;}
.prod-stat{background:var(--bg-2);border:1px solid var(--border);border-radius:var(--r);padding:12px;}
.prod-stat .pl{font-size:10.5px;color:var(--txt-3);text-transform:uppercase;}
.prod-stat .pv{font-family:'Syne';font-size:20px;font-weight:700;margin-top:3px;}

/* BUDGET */
.bud-grid{display:grid;grid-template-columns:1fr 340px;gap:16px;}
.svc-row{display:flex;align-items:center;gap:10px;padding:11px;background:var(--bg-2);border:1px solid var(--border);border-radius:var(--r-sm);margin-bottom:8px;}
.svc-check{width:21px;height:21px;border-radius:6px;border:2px solid var(--border);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.svc-check.on{background:var(--c-light);border-color:var(--c-light);color:#0d1024;}
.svc-row .sr-name{flex:1;font-size:13px;font-weight:600;}
.svc-row input{width:96px;text-align:right;}
.bud-summary{background:linear-gradient(160deg,var(--card),var(--bg-2));border:1px solid var(--border);border-radius:var(--r-lg);padding:20px;position:sticky;top:14px;}
.bud-line{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border-soft);font-size:13px;}
.bud-line.total{border:none;font-family:'Syne';font-size:22px;font-weight:800;padding-top:14px;}
.bud-line .bl-v{font-weight:600;}
.slider{-webkit-appearance:none;appearance:none;width:100%;height:6px;border-radius:5px;background:var(--bg-2);outline:none;padding:0;}
.slider::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--c-light);cursor:pointer;border:3px solid var(--card);box-shadow:0 2px 6px rgba(0,0,0,.4);}
.slider::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:var(--c-light);cursor:pointer;border:3px solid var(--card);}

.swatches{display:flex;gap:7px;flex-wrap:wrap;align-items:center;}
.swatch{width:29px;height:29px;border-radius:8px;cursor:pointer;border:2px solid transparent;transition:transform .12s;}
.swatch:hover{transform:scale(1.12);}
.swatch.sel{border-color:#fff;box-shadow:0 0 0 2px var(--card);}
.hex-wrap{display:flex;align-items:center;gap:8px;margin-top:9px;}
.hex-wrap input{width:120px;font-family:monospace;}
.hex-preview{width:34px;height:34px;border-radius:9px;border:1px solid var(--border);flex-shrink:0;}

.overlay{position:fixed;inset:0;background:rgba(8,10,26,.8);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:60;padding:18px;}
.overlay.show{display:flex;}
.modal{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:24px;width:100%;max-width:480px;max-height:90dvh;overflow-y:auto;animation:pop .2s ease;}
.modal.wide{max-width:620px;}
@keyframes pop{from{opacity:0;transform:scale(.96);}to{opacity:1;transform:none;}}
.modal h3{font-family:'Syne';font-size:18px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.modal-foot{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;flex-wrap:wrap;}
.form-grid{display:grid;gap:13px;}
.split{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.field{display:flex;flex-direction:column;}
.mini{font-size:11px;color:var(--txt-3);}
.doc-preview{background:#fff;color:#1a1a2e;border-radius:var(--r);padding:22px;font-size:12.5px;line-height:1.55;font-family:'DM Sans';white-space:pre-wrap;max-height:46dvh;overflow-y:auto;}

.mtoggle{display:none;}
@media(max-width:980px){.bud-grid{grid-template-columns:1fr;}.bud-summary{position:static;}}
@media(max-width:860px){
  .shell{grid-template-columns:1fr;}
  .sidebar{position:fixed;left:0;top:0;bottom:0;width:262px;max-width:85vw;transform:translateX(-100%);transition:transform .25s;padding-top:env(safe-area-inset-top);}
  .sidebar.open{transform:none;}
  .mtoggle{display:inline-flex;align-items:center;justify-content:center;width:42px;height:42px;border-radius:var(--r-sm);background:var(--card);border:1px solid var(--border);color:var(--txt);cursor:pointer;flex-shrink:0;}
  .mscrim{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:15;display:none;}
  .mscrim.show{display:block;}
  .topbar{padding:calc(12px + env(safe-area-inset-top)) 16px 12px;}
  .topbar h1{font-size:19px;}
  .scroll{padding:4px 14px calc(96px + env(safe-area-inset-bottom));}
  input,select,textarea{font-size:16px;padding:11px 12px;}
  .btn{padding:10px 15px;}
  .kpi-grid{grid-template-columns:repeat(2,1fr);gap:11px;}
  .kpi{padding:14px 15px;}
  .kpi .val{font-size:20px;}
  .kpi .ic{width:30px;height:30px;margin-bottom:9px;}
  .panel{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .tbl{min-width:540px;}
  .prod-hero{grid-template-columns:1fr;}
  .cd-hero{gap:13px;}
  .cd-hero .cd-name{font-size:22px;}
  .row-head{margin:20px 0 11px;}
  .modal{padding:20px;max-height:88dvh;}
  .pipe-col{min-width:75vw;}
}
@media(max-width:430px){
  .topbar h1{font-size:18px;}
  .kpi-grid{gap:9px;}
  .kpi .lbl{font-size:9.5px;}
  .kpi .val{font-size:18px;}
  .cgrid{grid-template-columns:1fr;}
  .cd-grid{grid-template-columns:1fr;}
  .date-chip .t{display:none;}
  .seg{width:100%;}
  .seg button{flex:1;text-align:center;}
  .split{grid-template-columns:1fr;}
  .tk-toolbar{flex-direction:column;align-items:stretch;}
  .tk-toolbar input,.tk-toolbar select,.tk-toolbar .btn{width:100%;}
  .tk-toolbar .btn{justify-content:center;}
  .prod-stats{grid-template-columns:1fr 1fr;}
  .modal-foot .btn{flex:1;justify-content:center;}
  .pipe-col{min-width:80vw;}
}
@media print{
  body *{visibility:hidden!important;}
  #printArea,#printArea *{visibility:visible!important;}
  #printArea{position:absolute!important;left:0;top:0;width:100%;display:block!important;}
  .bg-orbs{display:none!important;}
  @page{margin:12mm;size:A4;}
  #printArea>div{page-break-after:avoid;page-break-inside:avoid;}
  #printArea>div>div{page-break-inside:avoid;}
  html,body{height:auto!important;overflow:visible!important;}
}
#printArea{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
.alert{cursor:pointer;}
.alert:hover{filter:brightness(1.12);}
.rep-sec{margin-top:14px;}
.rep-sec h4{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--c-light);margin-bottom:7px;}
.rep-sec p{font-size:13px;line-height:1.55;color:var(--txt-2);}
.rep-step{display:flex;gap:9px;font-size:13px;color:var(--txt);margin-bottom:7px;}
.rep-step .rn{width:20px;height:20px;border-radius:50%;background:var(--c-deep);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-head{text-align:center;font-size:10.5px;font-weight:700;color:var(--txt-3);padding:6px 0;text-transform:uppercase;}
.cal-day{min-height:52px;border-radius:var(--r-sm);padding:6px;cursor:pointer;transition:background .12s;}
.cal-day:hover{background:var(--bg-2);}
.cal-today{background:rgba(116,170,255,.15);border:1px solid var(--c-light);}
.cal-today .cal-num{color:var(--c-light);font-weight:800;}
.cal-num{font-size:12.5px;color:var(--txt-2);}
.cal-dots{display:flex;gap:3px;margin-top:4px;flex-wrap:wrap;}
.cal-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}

const $=id=>document.getElementById(id);
const eur=n=>Math.round(n).toLocaleString('es-ES')+'€';
function fmtK(n){n=Math.round(n);return Math.abs(n)>=1000?(n/1000).toFixed(n%1000===0?0:1)+'k':''+n;}
function ym(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
function shiftYM(s,d){let[y,m]=s.split('-').map(Number);m+=d;while(m<1){m+=12;y--;}while(m>12){m-=12;y++;}return y+'-'+String(m).padStart(2,'0');}
function ymLabel(s){const[y,m]=s.split('-');return['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][+m-1]+' '+y.slice(2);}
function dayKey(){return new Date().toISOString().slice(0,10);}
function shiftDay(d,n){const dt=new Date(d);dt.setDate(dt.getDate()+n);return dt.toISOString().slice(0,10);}

function initials(n){return n.trim().split(/\s+/).slice(0,2).map(w=>w[0]).join('').toUpperCase();}
function esc(s){return(s==null?'':''+s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function activeClients(){return db.clients.filter(c=>c.status!=='archived');}

function classify(v,m){
  if(m.raw)return LEVELS[2];
  const t=m.th;let lvl;
  if(m.hi)lvl=v<t[0]?0:v<t[1]?1:v<t[2]?2:v<t[3]?3:4;
  else lvl=v>t[0]?0:v>t[1]?1:v>t[2]?2:v>t[3]?3:4;
  return LEVELS[lvl];
}
function clientHealth(c){
  if(!c.metricLog||!c.metricLog.length)return null;
  const months=[...new Set(c.metricLog.map(l=>l.month))].sort();
  const lastM=months[months.length-1];
  const last=c.metricLog.filter(l=>l.month===lastM);
  const defs=METRICS[c.service]||[];
  let sum=0,n=0;
  last.forEach(entry=>defs.forEach(m=>{
    if(m.raw)return;
    const v=entry.values[m.k];
    if(v!=null&&v!=='')  {sum+=classify(+v,m).s;n++;}
  }));
  if(!n)return null;
  let score=Math.round(sum/n);
  if(c.meetings&&c.meetings.length){
    const recent=c.meetings.some(mt=>(Date.now()-new Date(mt.date))/86400000<35);
    if(!recent)score=Math.max(0,score-8);
  }
  return score;
}
function healthLabel(s){

  if(s>=25)return{t:'En riesgo',c:'#F2974D'};
  return{t:'Crítico',c:'#F47174'};
}

/* ============ CHART ENGINE ============ */
function barChart(data,opt){
  opt=opt||{};
  const W=680,H=opt.h||240,pad={t:24,r:16,b:42,l:48};
  const cw=W-pad.l-pad.r,ch=H-pad.t-pad.b;
  const series=opt.series||[{key:'value',color:'#74AAFF'}];
  let max=0;data.forEach(d=>series.forEach(s=>max=Math.max(max,d[s.key]||0)));
  max=max*1.18||10;
  let g='',b='';
  for(let i=0;i<=4;i++){
    const y=pad.t+ch-(ch*i/4);
    g+=`<line x1="${pad.l}" y1="${y}" x2="${W-pad.r}" y2="${y}" stroke="#36406e"/>`;
    g+=`<text x="${pad.l-7}" y="${y+3.5}" font-size="10" fill="#6b74a0" text-anchor="end">${fmtK(max*i/4)}</text>`;
  }
  const bw=cw/Math.max(data.length,1);
  data.forEach((d,i)=>{
    const gx=pad.l+i*bw,sw=(bw*0.62)/series.length;
    series.forEach((s,si)=>{
      const v=d[s.key]||0,h=(v/max)*ch,x=gx+bw*0.19+si*sw,y=pad.t+ch-h;
      b+=`<rect x="${x}" y="${y}" width="${sw*0.86}" height="${Math.max(h,1)}" rx="3" fill="${s.color}" class="barRect"><title>${esc(d.label)}: ${eur(v)}</title></rect>`;
    });
    b+=`<text x="${gx+bw/2}" y="${H-pad.b+17}" font-size="9.5" fill="#a4adcf" text-anchor="middle">${esc(d.label)}</text>`;
  });
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">${g}${b}</svg>`+legend(series);
}
function lineChart(data,opt){
  opt=opt||{};
  const W=680,H=opt.h||240,pad={t:24,r:18,b:42,l:48};
  const cw=W-pad.l-pad.r,ch=H-pad.t-pad.b;
  const series=opt.series||[{key:'value',color:'#74AAFF'}];
  let max=0;data.forEach(d=>series.forEach(s=>max=Math.max(max,d[s.key]||0)));
  max=max*1.15||10;
  let g='';
  for(let i=0;i<=4;i++){
    const y=pad.t+ch-(ch*i/4);
    g+=`<line x1="${pad.l}" y1="${y}" x2="${W-pad.r}" y2="${y}" stroke="#36406e"/>`;
    g+=`<text x="${pad.l-7}" y="${y+3.5}" font-size="10" fill="#6b74a0" text-anchor="end">${fmtK(max*i/4)}</text>`;
  }
  const px=i=>data.length<=1?pad.l+cw/2:pad.l+(cw*i/(data.length-1));
  const py=v=>pad.t+ch-((v/max)*ch);
  let paths='';
  series.forEach(s=>{
    let d='';
    data.forEach((row,i)=>{d+=(i?'L':'M')+px(i)+' '+py(row[s.key]||0)+' ';});
    paths+=`<path d="${d}" fill="none" stroke="${s.color}" stroke-width="2.5" stroke-linejoin="round"/>`;
    data.forEach((row,i)=>{paths+=`<circle cx="${px(i)}" cy="${py(row[s.key]||0)}" r="3.4" fill="${s.color}"><title>${esc(row.label)}: ${eur(row[s.key]||0)}</title></circle>`;});
  });
  let lbl='';
  data.forEach((row,i)=>{if(data.length<=14||i%2===0)lbl+=`<text x="${px(i)}" y="${H-pad.b+17}" font-size="9.5" fill="#a4adcf" text-anchor="middle">${esc(row.label)}</text>`;});
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">${g}${paths}${lbl}</svg>`+legend(series);
}
function legend(series){
  if(series.length<2)return'';
  return'<div style="display:flex;gap:14px;justify-content:center;margin-top:6px;flex-wrap:wrap">'+
    series.map(s=>`<span style="display:flex;align-items:center;gap:5px;font-size:11px;color:#a4adcf"><span style="width:11px;height:3px;border-radius:2px;background:${s.color}"></span>${esc(s.label||s.key)}</span>`).join('')+'</div>';
}
function healthRing(score,size){
  const s=size||44,r=s/2-4,cx=s/2,cy=s/2,circ=2*Math.PI*r;
  const pct=score==null?0:score/100,col=healthLabel(score).c,off=circ*(1-pct);
  return `<svg width="${s}" height="${s}" viewBox="0 0 ${s} ${s}">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#36406e" stroke-width="4"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${col}" stroke-width="4" stroke-linecap="round"
      stroke-dasharray="${circ}" stroke-dashoffset="${off}" transform="rotate(-90 ${cx} ${cy})"/>
    <text x="${cx}" y="${cy+4}" font-size="${s*0.27}" font-weight="700" fill="${col}" text-anchor="middle" font-family="Syne">${score==null?'–':score}</text>
  </svg>`;
}

/* ============ ALERTS → TASKS ============ */
let lastAlerts=[];
function computeAlerts(){
  const out=[];
  db.clients.filter(c=>c.status!=='archived').forEach(c=>{
    const h=clientHealth(c);
    const contact=c.contact.person||'el cliente';
    if(h!=null&&h<40){
      out.push({key:'health-'+c.id,crit:true,prio:'crit',
        text:'⚠ '+c.name+' en riesgo de fuga (health '+h+'/100)',
        report:{
          diag:'El health score de '+c.name+' es de '+h+'/100, por debajo del umbral de seguridad. Este indicador resume el rendimiento de las métricas del último mes registrado.',
          why:'Un health score bajo suele anticipar una cancelación: el cliente no percibe resultados suficientes y puede plantearse dejar el servicio. Actuar pronto evita perder la cuenta.',
          actions:['Abre la ficha de '+c.name+' y revisa las métricas del último mes; identifica las 2-3 más débiles.','Agenda una reunión con '+contact+' esta misma semana.','Prepara un plan de acción concreto para revertir la tendencia y preséntalo.','Registra la reunión en la ficha del cliente — al hacerlo, la alerta se recalcula.']
        }});
    }else if(h!=null&&h<60){
      out.push({key:'health-'+c.id,crit:false,prio:'media',
        text:c.name+' con rendimiento regular ('+h+'/100)',
        report:{
          diag:'El health score de '+c.name+' es de '+h+'/100. Está en zona aceptable pero con margen de mejora claro.',
          why:'Un rendimiento regular mantenido puede erosionar la confianza del cliente con el tiempo. Es el momento de optimizar antes de que baje.',
          actions:['Revisa qué métricas concretas están tirando del score hacia abajo.','Ajusta la estrategia del mes (creatividades, segmentación, contenido).','Comunica al cliente las mejoras que vas a aplicar para reforzar la percepción de valor.']
        }});
    }
    if(c.status==='active'&&c.meetings&&c.meetings.length){
      const recent=c.meetings.some(mt=>(Date.now()-new Date(mt.date))/86400000<35);
      if(!recent)out.push({key:'meet-'+c.id,crit:false,prio:'baja',
        text:'Sin reuniones recientes con '+c.name+' (+35 días)',
        report:{
          diag:'Han pasado más de 35 días desde la última reunión registrada con '+c.name+'.',
          why:'La falta de contacto enfría la relación y reduce la percepción de valor del servicio, aunque los resultados sean buenos.',
          actions:['Escribe o llama a '+contact+' para agendar una puesta al día.','Comparte un breve informe de resultados del último mes.','Registra la reunión en la ficha del cliente cuando se realice.']
        }});
    }
  });
  const pend=db.incomes.filter(i=>i.status==='pending');
  if(pend.length){
    const tot=pend.reduce((a,b)=>a+b.amount,0);
    out.push({key:'pending-inv',crit:false,prio:'media',
      text:pend.length+' factura(s) pendiente(s) · '+eur(tot),
      report:{
        diag:'Hay '+pend.length+' ingreso(s) marcados como pendientes de cobro, por un total de '+eur(tot)+'.',
        why:'Las facturas sin cobrar afectan directamente a tu cashflow y distorsionan la previsión de ingresos del mes.',
        actions:['Envía un recordatorio amable de pago a los clientes afectados.','Confirma con cada uno la fecha prevista de cobro.','En Finanzas, marca el ingreso como Cobrado (toca la etiqueta de estado) cuando se resuelva.']
      }});
  }
  const overdue=db.tasks.filter(t=>!t.done&&!t.isAlert&&t.due&&t.due<dayKey());
  if(overdue.length){
    out.push({key:'overdue-tasks',crit:true,prio:'crit',
      text:'⚠ '+overdue.length+' tarea(s) vencida(s)',
      report:{
        diag:'Tienes '+overdue.length+' tarea(s) cuya fecha de entrega ya ha pasado.',
        why:'Las tareas vencidas se acumulan y generan retrasos en cadena que acaban afectando a los clientes.',
        actions:['Ve al panel de Tareas y revisa cuáles están vencidas.','Reprograma sus fechas de entrega de forma realista.','Prioriza las de clientes activos y completa o elimina lo que ya no aplique.']
      }});
  }
  const now=Date.now();
  return out.filter(a=>{
    const d=db.dismissedAlerts[a.key];
    return !(d&&now-d<86400000);
  });
}
function syncAlertTasks(){
  const now=Date.now();
  Object.keys(db.dismissedAlerts).forEach(k=>{if(now-db.dismissedAlerts[k]>86400000)delete db.dismissedAlerts[k];});
  const alerts=computeAlerts();
  const keys=alerts.map(a=>a.key);
  db.tasks=db.tasks.filter(t=>!t.isAlert||keys.includes(t.alertKey));
  alerts.forEach(a=>{
    const ex=db.tasks.find(t=>t.isAlert&&t.alertKey===a.key);
    if(ex){ex.text=a.text;ex.prio=a.prio;ex.crit=a.crit;}
    else db.tasks.unshift({id:uid(),text:a.text,prio:a.prio,cli:0,done:false,doneAt:0,due:'',isAlert:true,alertKey:a.key,crit:a.crit});
  });
}
function openAlertReport(i){
  const a=lastAlerts[i];if(!a||!a.report)return;
  const r=a.report;
  modal(`<div class="modal wide">
    <h3>${ic(a.crit?'alertT':'alertC',18)}${esc(a.text)}</h3>
    <div class="rep-sec"><h4>Qué está pasando</h4><p>${esc(r.diag)}</p></div>
    <div class="rep-sec"><h4>Por qué importa</h4><p>${esc(r.why)}</p></div>
    <div class="rep-sec"><h4>Qué deberías hacer</h4>
      ${r.actions.map((s,n)=>`<div class="rep-step"><span class="rn">${n+1}</span><span>${esc(s)}</span></div>`).join('')}
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModalNow()">Cerrar</button>
      <button class="btn btn-primary" onclick="dismissAlert('${esc(a.key)}')">${ic('checkC',15)}Marcar como resuelta</button>
    </div>
  </div>`);
}
async function dismissAlert(key){
  db.dismissedAlerts[key]=Date.now();
  db.tasks=db.tasks.filter(t=>!(t.isAlert&&t.alertKey===key));
  await persistDB();closeModalNow();render();
}

function viewDashboard(){
  const cm=curMonth(),pm=shiftYM(cm,-1);
  const rev=monthRevenue(cm),revP=monthRevenue(pm);
  const cost=monthCost(cm),costP=monthCost(pm);
  const prof=rev-cost,profP=revP-costP;
  const act=activeClients().filter(c=>c.status==='active').length;
  const mrr=db.clients.filter(c=>c.status==='active').reduce((a,b)=>a+(b.retainer||0),0);
  const leadsNew=db.leads.filter(l=>l.date===cm).length;
  const won=db.leads.filter(l=>l.stage==='Ganado').length;
  const churn=db.clients.filter(c=>c.status==='archived').length+db.leads.filter(l=>l.stage==='Perdido').length;
  const roasV=db.clients.map(c=>{const lg=c.metricLog&&c.metricLog[c.metricLog.length-1];return lg&&lg.values.roas;}).filter(Boolean);
  const roas=roasV.length?roasV.reduce((a,b)=>a+b,0)/roasV.length:0;
  const pipeVal=db.leads.filter(l=>!['Ganado','Perdido'].includes(l.stage)).reduce((a,b)=>a+(b.value||0),0);

  function tr(c,p){if(p===0)return c>0?{c:'up',t:'Nuevo este mes'}:{c:'flat',t:'Sin histórico'};const d=Math.round((c-p)/Math.abs(p)*100);return d>0?{c:'up',t:'+'+d+'% vs mes anterior'}:d<0?{c:'down',t:d+'% vs mes anterior'}:{c:'flat',t:'Igual que el mes anterior'};}
  const sem=(g,a)=>g?'g':a?'a':'r';
  const tRev=tr(rev,revP),tProf=tr(prof,profP);
  const kpis=[
    {i:'cash',l:'MRR / Ingresos mes',v:eur(rev),tr:tRev,s:sem(rev>=revP&&rev>0,rev>0)},
    {i:'coin',l:'Beneficio neto',v:eur(prof),tr:tProf,s:sem(prof>0,prof>=0)},
    {i:'repeat',l:'MRR recurrente',v:eur(mrr),tr:{c:'flat',t:act+' clientes con retainer'},s:sem(mrr>0,true)},
    {i:'users',l:'Clientes activos',v:act,tr:{c:'flat',t:db.clients.length+' en cartera'},s:sem(act>=2,act>=1)},
    {i:'userMinus',l:'Churn (perdidos)',v:churn,tr:{c:churn>0?'down':'flat',t:churn>0?'Ex-clientes + leads perdidos':'Sin pérdidas'},s:sem(churn===0,churn<=2)},
    {i:'flame',l:'Leads nuevos (mes)',v:leadsNew,tr:{c:leadsNew>0?'up':'flat',t:'Entrantes este mes'},s:sem(leadsNew>=3,leadsNew>=1)},
    {i:'checks',l:'Ventas cerradas',v:won,tr:{c:'flat',t:'Leads ganados (total)'},s:sem(won>=2,won>=1)},
    {i:'target',l:'ROAS medio',v:roas?roas.toFixed(1)+'x':'–',tr:{c:roas>=3?'up':'flat',t:roas?'Media de campañas':'Sin datos'},s:sem(roas>=3,roas>=2)},
    {i:'wallet',l:'Valor del pipeline',v:eur(pipeVal),tr:{c:'flat',t:'Oportunidades abiertas'},s:sem(pipeVal>0,true)},
    {i:'percent',l:'Conversión global',v:(db.leads.length?Math.round(won/db.leads.length*100):0)+'%',tr:{c:'flat',t:'Leads ganados / totales'},s:'a'}
  ];
  const alerts=computeAlerts();
  lastAlerts=alerts;
  let alertHtml;
  if(!alerts.length)alertHtml=`<div class="alert g" style="cursor:default">${ic('checkC',18)}<div><div class="at">Todo en orden</div><div class="ad">No hay alertas activas. Buen trabajo.</div></div></div>`;
  else alertHtml=alerts.map((a,i)=>`<div class="alert ${a.crit?'r':'a'}" onclick="openAlertReport(${i})">${ic(a.crit?'alertT':'alertC',18)}<div><div class="at">${esc(a.text)}</div><div class="ad">Toca para ver el informe y los pasos recomendados.</div></div></div>`).join('');

  return `
    <div class="row-head" style="margin-top:10px"><h2>Indicadores clave</h2><span class="meta">${ymLabel(cm)} · comparado con el mes anterior</span></div>
    <div class="kpi-grid">${kpis.map(k=>`
      <div class="kpi">
        <div class="sem sem-${k.s}"></div>
        <div class="ic">${svg(k.i,18)}</div>
        <div class="lbl">${k.l}</div>
        <div class="val">${k.v}</div>
        <div class="trend ${k.tr.c}">${svg(k.tr.c==='up'?'upR':k.tr.c==='down'?'downR':'minus',12)}${k.tr.t}</div>
      </div>`).join('')}</div>
    <div class="row-head"><h2>Alertas</h2><span class="meta">${alerts.length} activa(s) · semáforo verde/ámbar/rojo</span></div>
    <div>${alertHtml}</div>

    <div class="chart-card">
      <div class="ch-head"><span class="ch-title">Ingresos vs beneficio</span></div>
      <div id="dashChart"></div>
    </div>`;
}

/* ============ VIEW: PRESUPUESTOS ============ */
function viewPresupuestos(){
  const opts='<option value="0">— Sin asociar / lead nuevo —</option>'+db.clients.map(c=>`<option value="${c.id}" ${budgetState.clientId===c.id?'selected':''}>${esc(c.name)}</option>`).join('');
  let base=0;
  SVC_CATALOG.forEach(s=>{const st=budgetState.services[s.k];if(st&&st.on)base+=(st.price||s.base);});
  const niche=NICHES.find(n=>n.k===budgetState.niche)||NICHES[0];
  const adjusted=base*niche.m;
  const margin=budgetState.margin;
  const final=adjusted*(1+margin/100);
  return `
    <div class="row-head" style="margin-top:10px"><h2>Calculadora de presupuestos</h2>
      <span class="meta">Elige servicios, sector y tu margen de beneficio</span></div>
    <div class="bud-grid">
      <div>
        <div class="panel" style="margin-bottom:14px">
          <div class="split">
            <div class="field"><label>Cliente / lead</label><select id="bud-client" onchange="budSetClient(this.value)">${opts}</select></div>
            <div class="field"><label>Sector / nicho</label><select id="bud-niche" onchange="budSetNiche(this.value)">${NICHES.map(n=>`<option value="${n.k}" ${budgetState.niche===n.k?'selected':''}>${n.n} (×${n.m})</option>`).join('')}</select></div>
          </div>
        </div>
        <div class="panel">
          <div style="font-family:'Syne';font-weight:700;font-size:14px;margin-bottom:12px">Servicios incluidos</div>
          ${SVC_CATALOG.map(s=>{
            const st=budgetState.services[s.k]||{};
            return `<div class="svc-row">
              <div class="svc-check ${st.on?'on':''}" onclick="budToggle('${s.k}')">${st.on?svg('checks',13):''}</div>
              <span class="sr-name">${s.n}</span>
              <input type="number" value="${st.price!=null?st.price:s.base}" onchange="budPrice('${s.k}',this.value)" ${st.on?'':'disabled'}>
              <span class="mini">€/mes</span>
            </div>`;
          }).join('')}
        </div>
      </div>
      <div class="bud-summary">
        <div style="font-family:'Syne';font-weight:800;font-size:16px;margin-bottom:14px">Resumen</div>
        <div class="bud-line"><span>Suma de servicios</span><span class="bl-v">${eur(base)}</span></div>
        <div class="bud-line"><span>Ajuste por sector (×${niche.m})</span><span class="bl-v">${eur(adjusted)}</span></div>
        <div class="bud-line"><span>Margen de beneficio</span><span class="bl-v" style="color:var(--green)">+${margin}%</span></div>
        <div style="margin:14px 0 4px">
          <label>Beneficio que quieres sacar: ${margin}%</label>
          <input type="range" class="slider" min="0" max="120" value="${margin}" oninput="budMargin(this.value)">
        </div>
        <div class="bud-line total"><span>Precio final</span><span style="color:var(--c-light)">${eur(final)}</span></div>
        <div class="mini" style="margin:8px 0 14px">Beneficio estimado: ${eur(final-adjusted)} / mes</div>
        <button class="btn btn-primary" style="width:100%;justify-content:center;margin-bottom:8px" onclick="genProposalFromBudget()">${ic('fileText',15)}Generar propuesta</button>
        <button class="btn btn-ghost" style="width:100%;justify-content:center" onclick="applyBudgetToClient()">${ic('save',15)}Guardar como retainer del cliente</button>
      </div>
    </div>`;
}

/* ============ VIEW: FINANZAS ============ */
function viewFinanzas(){
  const months=periodMonths(finPeriod);
  const data=months.map(m=>({label:ymLabel(m),ing:monthRevenue(m),cost:monthCost(m)}));
  const inc=db.incomes.filter(i=>months.includes(i.date));
  const cst=db.costs.filter(c=>months.includes(c.date));
  const totalInc=inc.reduce((a,b)=>a+b.amount,0);
  const totalCost=cst.reduce((a,b)=>a+b.amount,0);
  const profit=totalInc-totalCost;
  const pending=db.incomes.filter(i=>i.status==='pending').reduce((a,b)=>a+b.amount,0);
  const recurring=db.costs.filter(c=>c.type==='fijo'&&c.date===curMonth()).reduce((a,b)=>a+b.amount,0);
  const tax=Math.max(0,profit*0.21);
  const forecast=db.clients.filter(c=>c.status==='active').reduce((a,b)=>a+(b.retainer||0),0);
  const margin=totalInc?Math.round(profit/totalInc*100):0;
  const kpis=[
    {i:'cash',l:'Cashflow del periodo',v:eur(profit),c:profit>=0?'var(--green)':'var(--red)'},
    {i:'upR',l:'Ingresos',v:eur(totalInc),c:'var(--c-light)'},
    {i:'downR',l:'Coste operativo',v:eur(totalCost),c:'var(--orange)'},
    {i:'percent',l:'Rentabilidad real',v:margin+'%',c:margin>=0?'var(--green)':'var(--red)'},
    {i:'file',l:'Impuestos estimados (21%)',v:eur(tax),c:'var(--txt)'},
    {i:'clock',l:'Facturas pendientes',v:eur(pending),c:pending>0?'var(--amber)':'var(--txt)'},
    {i:'repeat',l:'Pagos recurrentes / mes',v:eur(recurring),c:'var(--txt)'},
    {i:'chart',l:'Previsión mensual',v:eur(forecast),c:'var(--c-light)'}
  ];
  return `
    <div class="row-head" style="margin-top:10px"><h2>Panel financiero</h2>
      <div class="seg" id="finSeg">${periodBtns(finPeriod)}</div>
    </div>
    <div class="chart-card" style="margin-bottom:14px">
      <div class="ch-head"><span class="ch-title">Ingresos vs costes</span><span class="mini">${periodLabel(finPeriod)}</span></div>
      ${barChart(data,{series:[{key:'ing',color:'#74AAFF',label:'Ingresos'},{key:'cost',color:'#F2974D',label:'Costes'}],h:240})}
    </div>
    <div class="kpi-grid">${kpis.map(k=>`<div class="kpi"><div class="ic">${svg(k.i,18)}</div><div class="lbl">${k.l}</div><div class="val" style="color:${k.c}">${k.v}</div></div>`).join('')}</div>
    <div class="row-head"><h2>Ingresos</h2><button class="btn btn-primary btn-sm" onclick="openIncomeModal()">${ic('plus',15)}Añadir ingreso</button></div>
    <div class="panel">${incomeTable(inc)}</div>
    <div class="row-head"><h2>Costes operativos</h2><button class="btn btn-primary btn-sm" onclick="openCostModal()">${ic('plus',15)}Añadir coste</button></div>
    <div class="panel">${costTable(cst)}</div>`;
}
function periodBtns(cur){
  const opts=[['1m','Mes'],['3m','3M'],['6m','6M'],['1y','1A'],['2y','2A'],['5y','5A']];
  return opts.map(([k,n])=>`<button class="${k===cur?'on':''}" data-p="${k}">${n}</button>`).join('');
}
function periodLabel(p){return{'1m':'Mes actual','3m':'Últimos 3 meses','6m':'Últimos 6 meses','1y':'Último año','2y':'Últimos 2 años','5y':'Últimos 5 años'}[p];}
function incomeTable(inc){

/* ============ VIEW: EVOLUCION ============ */
function viewEvolucion(){

  const qmap={};
  months.forEach(m=>{const[y,mo]=m.split('-');const q=y+'-T'+(Math.floor((+mo-1)/3)+1);qmap[q]=qmap[q]||{ing:0,cost:0};qmap[q].ing+=monthRevenue(m);qmap[q].cost+=monthCost(m);});
  const qdata=Object.keys(qmap).map(q=>({label:q.split('-')[1]+' '+q.slice(2,4),ing:qmap[q].ing,prof:qmap[q].ing-qmap[q].cost}));
  return `
    <div class="row-head" style="margin-top:10px"><h2>Evolución</h2>
      <div class="seg" id="evoSeg">${periodBtns(evoPeriod)}</div>
    </div>

      ${lineChart(data,{series:[{key:'ing',color:'#74AAFF',label:'Ingresos'},{key:'prof',color:'#3ECF8E',label:'Beneficio'}],h:240})}

    <div class="chart-card" style="margin-bottom:14px">
      <div class="ch-head"><span class="ch-title">Por trimestre</span></div>
      ${qdata.length?barChart(qdata,{series:[{key:'ing',color:'#5E72E8',label:'Ingresos'},{key:'prof',color:'#3ECF8E',label:'Beneficio'}],h:220}):'<div class="empty">Sin datos</div>'}
    </div>
    <div class="row-head"><h2>Resumen por mes</h2></div>
    <div class="panel"><table class="tbl"><thead><tr><th>Mes</th><th style="text-align:right">Ingresos</th><th style="text-align:right">Costes</th><th style="text-align:right">Beneficio</th><th style="text-align:right">Margen</th></tr></thead><tbody>${

      </div>

function taskItemHtml(t){
  const pr=t.crit?'crit':t.prio;
  let due='';
  if(t.due){
    const today=dayKey();
    const cls=t.due<today?'due-over':t.due<=shiftDay(today,3)?'due-soon':'';
    due=`<span class="${cls}">${ic('clock',12)}${t.due<today?'Vencida':'Vence'} ${new Date(t.due).toLocaleDateString('es-ES',{day:'numeric',month:'short'})}</span>`;
  }
  return `<div class="titem${t.done?' done':''}${t.crit&&!t.done?' alert-crit':''}">
    <div class="prio prio-${pr}"></div>
    <div class="tcheck ${t.done?'on':''}" onclick="toggleTask(${t.id})">${t.done?svg('checks',13):''}</div>
    <div class="tbody">
      <div class="ttext">${esc(t.text)}</div>
      <div class="tsub">${due}${t.isAlert?'<span>'+ic('alertC',12)+' Alerta automática</span>':''}${t.done?'<span>'+ic('trash',12)+' Se borra pronto</span>':''}</div>
    </div>
    <div class="tmeta">
      <span class="pill pill-${pr}">${t.crit?'prioridad 1':t.prio}</span>
      ${t.cli?`<span class="pill pill-cli">${esc(cliName(t.cli))}</span>`:''}
      <span class="tdel" onclick="delTask(${t.id})">${ic('trash',16)}</span>
    </div>
  </div>`;
}
function renderTaskActive(){
  let active=db.tasks.filter(t=>!t.done);
  const pr={crit:-1,alta:0,media:1,baja:2};
  const rank=t=>t.crit?-1:pr[t.prio];
  if(['alta','media','baja'].includes(taskFilter))active=active.filter(t=>t.prio===taskFilter&&!t.crit||(t.crit&&taskFilter==='alta'));
  if(taskFilter==='cliente'){
    const groups={};active.forEach(t=>{(groups[t.cli]=groups[t.cli]||[]).push(t);});
    if(!Object.keys(groups).length)return'<div class="panel"><div class="empty">'+ic('check',30)+'<div>Sin tareas activas</div></div></div>';
    return Object.keys(groups).sort((a,b)=>+a-+b).map(cid=>`
      <div class="row-head" style="margin-top:14px"><h2 style="font-size:13px;color:${cliColor(+cid)}">${ic('folder',14)} ${esc(cliName(+cid))}</h2><span class="meta">${groups[cid].length}</span></div>
      <div class="tlist">${groups[cid].sort((a,b)=>rank(a)-rank(b)).map(taskItemHtml).join('')}</div>`).join('');
  }
  active.sort((a,b)=>rank(a)-rank(b));
  if(!active.length)return'<div class="tlist"><div class="empty">'+ic('check',30)+'<div>Sin tareas activas en este filtro</div></div></div>';

function checkAutomatedNotifications(){
  if(!db||Notification.permission!=='granted')return;
  const now=Date.now();
  if(!db.notifiedKeys)db.notifiedKeys={};

  function once(key,fn){
    const last=db.notifiedKeys[key];
    if(!last||now-last>86400000){
      db.notifiedKeys[key]=now;
      fn();
      persistDB();
    }
  }

  // Tareas sin completar 3+ días
  db.tasks.filter(t=>!t.done&&!t.isAlert&&t.createdAt&&now-t.createdAt>3*86400000)
    .forEach(t=>{
      once('task3d-'+t.id,()=>
        sendNotif('📌 Tarea sin completar · 3 días',t.text));
    });

  // Health score bajo 60
  db.clients.filter(c=>c.status!=='archived').forEach(c=>{
    const h=clientHealth(c);
    if(h!=null&&h<60){
      once('health60-'+c.id,()=>
        sendNotif('⚠️ Health score bajo · '+c.name,'Score '+h+'/100 — requiere atención.'));
    }
  });

  // Facturas pendientes 4+ días
  db.incomes.filter(i=>i.status==='pending').forEach(i=>{
    const days=Math.floor((now-new Date(i.date+'-15'))/86400000);
    if(days>=4){
      once('inv4d-'+i.id,()=>
        sendNotif('💸 Factura pendiente +4 días',cliName(i.clientId)+' · '+eur(i.amount)));
    }
  });

  // Tareas que vencen en 24h
  db.tasks.filter(t=>!t.done&&!t.isAlert&&t.due).forEach(t=>{
    const diff=new Date(t.due+'T09:00:00')-new Date();
    if(diff>0&&diff<86400000){
      once('due24h-'+t.id,()=>{
        const delay=Math.max(diff-3600000,5000);
        setTimeout(()=>sendNotif('⏰ Tarea vence en 24h',t.text),delay);
      });
    }
  });
}

}

/* ============ PRODUCTIVITY ============ */
function prodCheckDay(){
  const today=dayKey();
  if(!db.prodToday)db.prodToday={date:today,points:0,count:0};
  if(db.prodToday.date!==today){
    if(db.prodToday.points>0||db.prodToday.count>0){
      db.prodLog.push({date:db.prodToday.date,score:prodScore(db.prodToday.points),count:db.prodToday.count});
      if(db.prodLog.length>60)db.prodLog=db.prodLog.slice(-60);
    }
    db.prodToday={date:today,points:0,count:0};
  }
}
async function prodAdd(w){prodCheckDay();db.prodToday.points+=w;db.prodToday.count++;await persistDB();}
function prodScore(p){return Math.min(100,Math.round(p*2.5));}
function prodGrade(s){if(s>=90)return{t:'Excelente',c:'#3ECF8E'};if(s>=70)return{t:'Muy bueno',c:'#5BC98E'};if(s>=50)return{t:'Bueno',c:'#F5C147'};if(s>=25)return{t:'Mejorable',c:'#F2974D'};return{t:'Bajo',c:'#F47174'};}
async function saveProdDay(){
  prodCheckDay();
  const score=prodScore(db.prodToday.points),today=dayKey();
  const ex=db.prodLog.find(e=>e.date===today);
  if(ex){ex.score=score;ex.count=db.prodToday.count;}
  else db.prodLog.push({date:today,score,count:db.prodToday.count});
  if(db.prodLog.length>60)db.prodLog=db.prodLog.slice(-60);
  await persistDB();render();
}
async function resetProdDay(){if(!confirm('¿Reiniciar la productividad de hoy?'))return;db.prodToday={date:dayKey(),points:0,count:0};await persistDB();render();}

  async function deleteMetricEntry(clientId, month, scope){
  const c=db.clients.find(x=>x.id===clientId);if(!c)return;
  if(!confirm('¿Eliminar este registro de métricas ('+scope+' · '+ymLabel(month)+')?'))return;
  c.metricLog=c.metricLog.filter(l=>!(l.month===month&&(l.scope||'General')===(scope||'General')));
  await persistDB();render();
}
function editMetricEntry(clientId, month, scope){
  curClient=clientId;
  const c=db.clients.find(x=>x.id===clientId);if(!c)return;
  const entry=c.metricLog.find(l=>l.month===month&&(l.scope||'General')===(scope||'General'));
  if(!entry)return;
  openMetricModal({month,scope,values:entry.values});
}
function addCustomDef(){
  const c=db.clients.find(x=>x.id===curClient);if(!c)return;
  const name=($('newMetricName').value||'').trim();
  if(!name){alert('Escribe un nombre para la métrica');return;}
  const unit=($('newMetricUnit').value||'').trim();
  c.customDefs=c.customDefs||[];
  const k='custom_'+Date.now();
  c.customDefs.push({k,n:name,u:unit,hi:true,th:[0,0,0,0],raw:true});
  persistDB();
  openMetricModal();
}
async function deleteCustomDef(k){
  const c=db.clients.find(x=>x.id===curClient);if(!c)return;
  if(!confirm('¿Eliminar esta definición de métrica?'))return;
  c.customDefs=(c.customDefs||[]).filter(m=>m.k!==k);
  c.metricLog.forEach(l=>{delete l.values[k];});
  await persistDB();openMetricModal();
}
async function saveMetrics(){
  const c=db.clients.find(x=>x.id===curClient);if(!c)return;
  const defs=METRICS[c.service]||[];
  const custom=c.customDefs||[];
  const allDefs=[...defs,...custom];
  const month=$('mtDate').value||curMonth();
  const scope=($('mtScope').value||'General').trim()||'General';
  const values={};let any=false;
  allDefs.forEach(m=>{
    const el=$('mtf-'+m.k);
    if(el&&el.value!==''){values[m.k]=parseFloat(el.value);any=true;}
  });
  if(!any){alert('Rellena al menos una métrica');return;}
  const ex=c.metricLog.find(l=>l.month===month&&(l.scope||'General')===scope);
  if(ex)ex.values=values;
  else c.metricLog.push({id:uid(),month,scope,values});
  c.metricLog.sort((a,b)=>a.month<b.month?-1:a.month>b.month?1:0);
  await persistDB();closeModalNow();render();
}

function budSetClient(v){budgetState.clientId=+v;const c=db.clients.find(x=>x.id===+v);if(c&&c.niche){budgetState.niche=c.niche;}render();}
function budSetNiche(v){budgetState.niche=v;render();}
function budMargin(v){budgetState.margin=+v;render();}
function budToggle(k){const s=budgetState.services[k]=budgetState.services[k]||{};s.on=!s.on;render();}
function budPrice(k,v){const s=budgetState.services[k]=budgetState.services[k]||{};s.price=parseFloat(v)||0;render();}
function budgetForClient(id){
  budgetState.clientId=id;
  const c=db.clients.find(x=>x.id===id);
  if(c){budgetState.niche=c.niche||'local';
    const map={ads:'ads',social:'social',web:'web',full:'social'};
    budgetState.services={};budgetState.services[map[c.service]]={on:true};
  }
  curTab='presupuestos';render();
}
function budgetTotals(){
  let base=0;SVC_CATALOG.forEach(s=>{const st=budgetState.services[s.k];if(st&&st.on)base+=(st.price!=null?st.price:s.base);});
  const niche=NICHES.find(n=>n.k===budgetState.niche)||NICHES[0];
  const adjusted=base*niche.m;
  const final=adjusted*(1+budgetState.margin/100);
  return{base,adjusted,final,niche};
}
async function applyBudgetToClient(){
  const c=db.clients.find(x=>x.id===budgetState.clientId);
  if(!c){alert('Selecciona un cliente existente para guardar el retainer.');return;}
  const{final}=budgetTotals();
  if(!final){alert('Añade al menos un servicio.');return;}
  c.retainer=Math.round(final);
  await persistDB();alert('Retainer de '+c.name+' actualizado a '+eur(final)+'/mes.');render();
}

function genInvoice(clientId){
  const c=db.clients.find(x=>x.id===clientId);if(!c)return;
  const cm=curMonth();
  const items=db.incomes.filter(i=>i.clientId===clientId&&i.date===cm).map(i=>({concept:i.concept,amount:i.amount}));
  const list=items.length?items:[{concept:c.retainer?'Retainer mensual · '+ymLabel(cm):'Servicios de marketing',amount:c.retainer||0}];
  openInvoiceDoc({
    clientName:c.name,
    clientExtra:[c.contact.person,c.contact.email].filter(Boolean).join(' · '),
    items:list,
    notes:'Pago por transferencia bancaria. IVA según régimen aplicable.\nGracias por confiar en M1 Media.',
    phone:c.contact.phone||''
  });
}
function defaultProposal(name,niche,price,services){
  const n=NICHES.find(x=>x.k===niche);
  return{
    clientName:name||'',
    intro:'Gracias por tu interés en trabajar con M1 Media. Tras analizar tu negocio'+(n?' en el sector '+n.n.toLowerCase():'')+', he preparado esta propuesta con un plan de trabajo pensado para conseguir resultados reales y medibles.',
    includes:services&&services.length?services:['Estrategia de marketing adaptada a tu sector','Gestión y optimización continua','Reporte de resultados periódico'],
    excludes:['Inversión publicitaria (presupuesto de anuncios aparte)','Diseño de logotipo o identidad de marca','Producción de vídeo profesional'],
    price:price||0,
    conditions:'Colaboración mensual sin permanencia. Reunión de seguimiento cada mes y comunicación directa por WhatsApp durante toda la colaboración.'
  };
}
function genProposalFromLead(id){
  const l=db.leads.find(x=>x.id===id);if(!l)return;
  const services=l.niche==='ecom'?['Gestión de Meta Ads orientada a ventas','Creación de contenido para redes','Optimización de la ficha de producto']
    :['Gestión de redes sociales','Gestión de campañas de Meta Ads','Creación de contenido mensual'];
  const d=defaultProposal(l.name,l.niche,l.value||0,services);
  d.phone=l.phone||'';
  openProposalDoc(d);
}
function genProposalFromBudget(){
  const{final}=budgetTotals();
  if(!final){alert('Añade al menos un servicio al presupuesto.');return;}
  const services=SVC_CATALOG.filter(s=>budgetState.services[s.k]&&budgetState.services[s.k].on).map(s=>s.n);
  const c=db.clients.find(x=>x.id===budgetState.clientId);
  const d=defaultProposal(c?c.name:'',budgetState.niche,final,services);
  if(c)d.phone=c.contact.phone||'';
  openProposalDoc(d);
}
/* ============ CALENDARIO ============ */
function gatherAllEvents(){
  const events=[];
  db.clients.forEach(c=>{
    (c.meetings||[]).forEach(m=>{
      events.push({date:m.date,time:m.time||'10:00',title:'Reunión · '+c.name,sub:m.notes||'',color:c.color,type:'client',id:m.id});
    });
  });
  db.leads.filter(l=>l.stage==='Reunión'&&l.meetingDate).forEach(l=>{
    events.push({date:l.meetingDate,title:'Demo · '+l.name,sub:l.notes||'',color:STAGE_COL['Reunión'],type:'lead',id:l.id});
  });
  return events.sort((a,b)=>a.date<b.date?-1:1);
}
function calNav(dir){
  calMonth+=dir;
  if(calMonth<0){calMonth=11;calYear--;}
  if(calMonth>11){calMonth=0;calYear++;}
  render();
}
function calDayClick(date){
  const evs=gatherAllEvents().filter(e=>e.date===date);
  if(!evs.length)return;
  modal(`<div class="modal">
    <h3>${ic('calendar',18)}${new Date(date+'T12:00').toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</h3>
    <div class="tlist" style="margin-top:0">
      ${evs.map(e=>`<div class="titem">
        <div class="prio" style="background:${e.color};min-height:34px"></div>
        <div class="tbody">
          <div class="ttext">${esc(e.title)}</div>
          <div class="tsub">${new Date(e.date+'T12:00').toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'})} · ${e.time||'10:00'}h</div>
        </div>
        <span class="pill pill-cli">${e.type==='lead'?'Lead':'Cliente'}</span>
      </div>`).join('')}
    </div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModalNow()">Cerrar</button></div>
  </div>`);
}
function viewCalendario(){
  const events=gatherAllEvents();
  const today=dayKey();
  const y=calYear,m=calMonth;
  const firstDay=(new Date(y,m,1).getDay()+6)%7;
  const daysInMonth=new Date(y,m+1,0).getDate();
  const monthName=new Date(y,m,1).toLocaleDateString('es-ES',{month:'long',year:'numeric'});
  const byDate={};
  events.forEach(e=>{if(!byDate[e.date])byDate[e.date]=[];byDate[e.date].push(e);});
  const upcoming=events.filter(e=>e.date>=today).slice(0,10);
  let cells='';
  for(let i=0;i<firstDay;i++)cells+='<div></div>';
  for(let d=1;d<=daysInMonth;d++){
    const ds=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const isToday=ds===today;
    const evs=byDate[ds]||[];
    cells+=`<div class="cal-day${isToday?' cal-today':''}${evs.length?' cal-has-ev':''}" onclick="calDayClick('${ds}')">
      <div class="cal-num">${d}</div>
      <div class="cal-dots">${evs.slice(0,4).map(e=>`<span class="cal-dot" style="background:${e.color}"></span>`).join('')}</div>
    </div>`;
  }
  return`
    <div class="row-head" style="margin-top:10px">
      <h2>Calendario de reuniones</h2>
      <div style="display:flex;gap:6px;align-items:center">
        <button class="btn btn-ghost btn-sm" onclick="calNav(-1)">${svg('back',14)}</button>
        <span style="font-size:13px;font-weight:600;text-transform:capitalize;min-width:150px;text-align:center">${monthName}</span>
        <button class="btn btn-ghost btn-sm" style="transform:scaleX(-1)" onclick="calNav(1)">${svg('back',14)}</button>
      </div>
    </div>
    <div class="panel" style="margin-bottom:14px">
      <div class="cal-grid">
        ${['L','M','X','J','V','S','D'].map(d=>`<div class="cal-head">${d}</div>`).join('')}
        ${cells}
      </div>
    </div>
    <div class="row-head"><h2>Próximas reuniones</h2><span class="meta">${upcoming.length} eventos</span></div>
    <div class="tlist">
      ${upcoming.length?upcoming.map(e=>`
        <div class="titem">
          <div class="prio" style="background:${e.color};min-height:34px"></div>
          <div class="tbody">
            <div class="ttext">${esc(e.title)}</div>
            <div class="tsub">
              <span>${new Date(e.date+'T12:00').toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'})} · ${e.time||'10:00'}h</span>
              ${e.sub?`<span>${esc(e.sub)}</span>`:''}
            </div>
          </div>
          <span class="pill pill-cli">${e.type==='lead'?'Lead':'Cliente'}</span>
        </div>`).join('')
      :'<div class="empty">'+ic('calendar',30)+'<div>Sin reuniones próximas</div></div>'}
    </div>`;
}
/* ============ NOTIFICATIONS ============ */
function sendNotif(title,body){
  if(!('Notification' in window)||Notification.permission!=='granted')return;
  try{
    if(navigator.serviceWorker&&navigator.serviceWorker.controller){
      navigator.serviceWorker.controller.postMessage({type:'NOTIF',title,body});
    }else{
      new Notification(title,{body,icon:'/icons/icon-192.png'});
    }
  }catch(e){}
}
async function pushNotif(title,body,sendAfterMs){
  try{
    const payload={
      app_id:ONESIGNAL_APP_ID,
      included_segments:['All'],
      headings:{en:title,es:title},
      contents:{en:body,es:body},
      url:window.location.origin
    };
    if(sendAfterMs&&sendAfterMs>0){
      payload.send_after=new Date(Date.now()+sendAfterMs).toISOString();
    }
    const res=await fetch('https://onesignal.com/api/v1/notifications',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'Authorization':'Basic '+ONESIGNAL_REST_KEY
      },
      body:JSON.stringify(payload)
    });
    if(!res.ok)throw new Error('OS error');
  }catch(e){
    console.warn('Push falló:',e);
    sendNotif(title,body);
  }
}
async function initNotifications(){
  if(!window.OneSignal)return;
  try{
    await OneSignal.init({
      appId:ONESIGNAL_APP_ID,
      safari_web_id:'web.onesignal.auto.511f3fe8-4f38-4cfd-9441-4579acc1dc24',
      notifyButton:{enable:false},
      allowLocalhostAsSecureOrigin:true,
      serviceWorkerPath:'/sw.js'
    });
    const granted=await OneSignal.Notifications.requestPermission();
    if(granted){
      scheduleLocalNotifications();
      setInterval(scheduleLocalNotifications,3600000);
    }
  }catch(e){console.warn('OneSignal:',e);}
}
function scheduleLocalNotifications(){
  if(!db)return;
  const now=new Date(),today=dayKey();
  try{
    gatherAllEvents().forEach(e=>{
      if(!e.date)return;
      const base=new Date(e.date+'T'+(e.time||'10:00')+':00');
      const ms24=base-now-86400000;
      const ms30=base-now-1800000;
      if(ms24>0&&ms24<86400000*2)
        pushNotif('📅 Reunión mañana',e.title,ms24);
      if(ms30>0&&ms30<86400000)
        pushNotif('⏰ Reunión en 30 min',e.title,ms30);
    });
  }catch(e){}
  try{
    db.tasks.filter(t=>!t.done&&!t.isAlert&&t.due===today).forEach(t=>{
      const target=new Date();target.setHours(9,0,0,0);
      const delay=Math.max(target-now,10000);
      setTimeout(()=>sendNotif('📌 Tarea vence hoy',t.text),delay);
    });
  }catch(e){}
  try{
    const crits=computeAlerts().filter(a=>a.crit);
    if(crits.length)
      setTimeout(()=>pushNotif('⚠️ Alerta M1 Media',crits[0].text),8000);
  }catch(e){}
}
function checkAutomatedNotifications(){
  if(!db||Notification.permission!=='granted')return;
  const now=Date.now();
  if(!db.notifiedKeys)db.notifiedKeys={};
  function once(key,fn){
    const last=db.notifiedKeys[key];
    if(!last||now-last>86400000){
      db.notifiedKeys[key]=now;
      fn();
      persistDB();
    }
  }
  db.tasks.filter(t=>!t.done&&!t.isAlert&&t.createdAt&&now-t.createdAt>3*86400000)
    .forEach(t=>{
      once('task3d-'+t.id,()=>
        pushNotif('📌 Tarea sin completar · 3 días',t.text));
    });
  db.clients.filter(c=>c.status!=='archived').forEach(c=>{
    const h=clientHealth(c);
    if(h!=null&&h<60){
      once('health60-'+c.id,()=>
        pushNotif('⚠️ Health score bajo · '+c.name,'Score '+h+'/100 — requiere atención.'));
    }
  });
  db.incomes.filter(i=>i.status==='pending').forEach(i=>{
    const days=Math.floor((now-new Date(i.date+'-15'))/86400000);
    if(days>=4){
      once('inv4d-'+i.id,()=>
        pushNotif('💸 Factura pendiente +4 días',cliName(i.clientId)+' · '+eur(i.amount)));
    }
  });
  db.tasks.filter(t=>!t.done&&!t.isAlert&&t.due).forEach(t=>{
    const diff=new Date(t.due+'T09:00:00')-new Date();
    if(diff>0&&diff<86400000){
      once('due24h-'+t.id,()=>{
        pushNotif('⏰ Tarea vence en 24h',t.text,Math.max(diff-3600000,5000));
      });
    }
  });
}

<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --c-light:#74AAFF;--c-deep:#285BB0;
  --bg:#1a2038;--bg-2:#222a47;--card:#262e52;--card-2:#2c3560;
  --border:#36406e;--border-soft:#2e3760;
  --txt:#eef1fb;--txt-2:#a4adcf;--txt-3:#6b74a0;
  --green:#3ECF8E;--amber:#F5C147;--red:#F47174;--purple:#A98BFF;--orange:#F2974D;
  --pink:#F58FC2;--pink-bg:rgba(245,143,194,.13);
  --r-sm:9px;--r:13px;--r-lg:18px;
  --font-num:'Space Grotesk',sans-serif;
}
html,body{height:100%;-webkit-text-size-adjust:100%;}
body{font-family:'DM Sans',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--txt);font-size:14px;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
.scroll{overflow-x:hidden;}
.ttext,.tsub,.cname,.ctype{overflow-wrap:break-word;word-break:break-word;}
::-webkit-scrollbar{width:9px;height:9px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px;}
::-webkit-scrollbar-thumb:hover{background:#46508a;}
svg{display:block;}
.ico{display:inline-flex;vertical-align:-.18em;}
.bg-orbs{position:fixed;inset:0;z-index:-1;pointer-events:none;overflow:hidden;}
.bg-orbs::before,.bg-orbs::after{content:'';position:absolute;border-radius:50%;filter:blur(80px);opacity:.5;}
.bg-orbs::before{width:520px;height:520px;background:radial-gradient(circle,rgba(116,170,255,.18),transparent 70%);top:-10%;left:5%;animation:drift1 22s ease-in-out infinite;}
.bg-orbs::after{width:560px;height:560px;background:radial-gradient(circle,rgba(40,91,176,.20),transparent 70%);bottom:-15%;right:0%;animation:drift2 28s ease-in-out infinite;}
@keyframes drift1{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(60px,40px) scale(1.08);}}
@keyframes drift2{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(-50px,-30px) scale(1.12);}}
.loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:100;}
.loading-screen.hide{display:none;}
.spinner{width:38px;height:38px;border:3px solid var(--border);border-top-color:var(--c-light);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-screen p{color:var(--txt-2);font-size:13px;}
.shell{display:grid;grid-template-columns:236px 1fr;min-height:100vh;}
.shell.hide{display:none;}
.sidebar{background:rgba(22,27,52,.92);backdrop-filter:blur(14px);border-right:1px solid var(--border-soft);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;z-index:20;}
.logo{padding:14px 16px 12px;border-bottom:1px solid var(--border-soft);}
.logo-mark{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;letter-spacing:-.01em;display:flex;align-items:center;}
.logo-dot{width:5px;height:5px;border-radius:50%;background:var(--c-light);margin:0 4px 3px;}
.logo-sub{font-size:9.5px;color:var(--txt-3);letter-spacing:.14em;text-transform:uppercase;margin-top:3px;}
nav{padding:12px 11px;flex:1;display:flex;flex-direction:column;gap:2px;overflow-y:auto;}
.nav-item{display:flex;align-items:center;gap:11px;padding:11px 13px;font-size:13.5px;font-weight:500;color:var(--txt-2);cursor:pointer;border-radius:var(--r-sm);transition:all .15s;}
.nav-item:hover{color:var(--txt);background:var(--card);}
.nav-item.active{color:#fff;background:linear-gradient(135deg,var(--c-deep),var(--c-light));box-shadow:0 4px 16px rgba(116,170,255,.3);}
.nav-item .ico{flex-shrink:0;}
.nav-item .badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 5px;}
.nav-item.active .badge{background:rgba(255,255,255,.25);}
.side-foot{padding:14px 16px;border-top:1px solid var(--border-soft);display:flex;align-items:center;gap:11px;}
.avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--c-deep),var(--c-light));display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;flex-shrink:0;}
.side-foot .nm{font-size:13px;font-weight:600;}
.side-foot .ur{font-size:11px;color:var(--txt-3);}
.main{display:flex;flex-direction:column;min-width:0;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 30px;gap:14px;}
.topbar h1{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;letter-spacing:-.01em;}
.topbar .sub{font-size:11px;color:var(--txt-2);margin-top:1px;}
.date-chip{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:9px 14px;flex-shrink:0;color:var(--c-light);}
.date-chip .d{font-size:12.5px;font-weight:600;text-transform:capitalize;color:var(--txt);}
.date-chip .t{font-size:10.5px;color:var(--txt-3);}
.scroll{flex:1;padding:4px 30px 60px;}
.tab{display:none;animation:fade .32s ease;}
.tab.active{display:block;}
@keyframes fade{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
@keyframes riseIn{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}
.kpi{animation:riseIn .4s ease backwards;}
.kpi:nth-child(1){animation-delay:.02s;}.kpi:nth-child(2){animation-delay:.06s;}.kpi:nth-child(3){animation-delay:.1s;}.kpi:nth-child(4){animation-delay:.14s;}.kpi:nth-child(5){animation-delay:.18s;}.kpi:nth-child(n+6){animation-delay:.22s;}
.ccard,.obj-card,.chart-card,.panel{animation:riseIn .42s ease backwards;}
.kpi,.ccard,.obj-card,.lead-card,.btn,.nav-item,.iconbtn{transition:transform .18s cubic-bezier(.4,0,.2,1),box-shadow .18s ease,border-color .18s ease,background .18s ease;}
.kpi:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.22);}
.chart-card,.panel{transition:box-shadow .25s ease;}
.row-head{display:flex;align-items:center;justify-content:space-between;margin:24px 0 13px;gap:12px;flex-wrap:wrap;}
.row-head h2{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;}
.row-head .meta{font-size:12px;color:var(--txt-3);}
.btn{display:inline-flex;align-items:center;gap:7px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;border:none;border-radius:var(--r-sm);padding:9px 15px;cursor:pointer;transition:all .15s;}
.btn-primary{background:linear-gradient(135deg,var(--c-deep),var(--c-light));color:#fff;box-shadow:0 4px 14px rgba(116,170,255,.3);}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(116,170,255,.42);}
.btn-ghost{background:var(--card);color:var(--txt-2);border:1px solid var(--border);}
.btn-ghost:hover{color:var(--txt);border-color:#46508a;}
.btn-sm{padding:6px 11px;font-size:12px;}
.btn-green{background:linear-gradient(135deg,#2c9d6c,#3ECF8E);color:#fff;}
.btn-red{background:rgba(244,113,116,.15);color:var(--red);border:1px solid rgba(244,113,116,.3);}
input,select,textarea{font-family:'DM Sans',sans-serif;background:var(--bg-2);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--txt);font-size:13px;padding:10px 12px;outline:none;transition:border .15s;width:100%;}
input::placeholder,textarea::placeholder{color:var(--txt-3);}
input:focus,select:focus,textarea:focus{border-color:var(--c-light);}
select option{background:var(--bg-2);}
label{font-size:11px;font-weight:600;color:var(--txt-2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;display:block;}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(225px,1fr));gap:14px;}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:17px 18px;position:relative;overflow:hidden;}
.kpi .sem{position:absolute;top:16px;right:16px;width:11px;height:11px;border-radius:50%;}
.sem-g{background:var(--green);box-shadow:0 0 8px rgba(62,207,142,.6);}
.sem-a{background:var(--amber);box-shadow:0 0 8px rgba(245,193,71,.6);}
.sem-r{background:var(--red);box-shadow:0 0 8px rgba(244,113,116,.6);}
.kpi .ic{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;margin-bottom:11px;background:rgba(116,170,255,.14);color:var(--c-light);}
.kpi .lbl{font-size:10.5px;color:var(--txt-2);text-transform:uppercase;letter-spacing:.06em;}
.kpi .val{font-family:var(--font-num);font-size:25px;font-weight:600;letter-spacing:-.02em;margin-top:3px;}
.kpi .trend{font-size:11px;margin-top:5px;display:flex;align-items:center;gap:4px;}
.trend.up{color:var(--green);}
.trend.down{color:var(--red);}
.trend.flat{color:var(--txt-3);}
.panel{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px;}
.empty{text-align:center;padding:34px;color:var(--txt-3);font-size:13px;}
.empty .ico{margin-bottom:10px;opacity:.5;}
.alert{display:flex;align-items:flex-start;gap:11px;padding:12px 15px;border-radius:var(--r);margin-bottom:9px;font-size:13px;border:1px solid;cursor:pointer;}
.alert .ico{flex-shrink:0;margin-top:1px;}
.alert.r{background:rgba(244,113,116,.09);border-color:rgba(244,113,116,.3);color:#ffb3b4;}
.alert.a{background:rgba(245,193,71,.09);border-color:rgba(245,193,71,.3);color:#ffe09a;}
.alert.g{background:rgba(62,207,142,.09);border-color:rgba(62,207,142,.3);color:#9ee9c5;}
.alert .at{font-weight:600;}
.alert .ad{color:var(--txt-2);font-size:12px;margin-top:1px;}
.alert:hover{filter:brightness(1.12);}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px 20px;}
.chart-card .ch-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;flex-wrap:wrap;gap:8px;}
.chart-card .ch-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;}
.seg{display:flex;background:var(--bg-2);border:1px solid var(--border);border-radius:var(--r-sm);padding:3px;gap:2px;flex-wrap:wrap;}
.seg button{background:transparent;border:none;color:var(--txt-2);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;padding:6px 11px;border-radius:6px;cursor:pointer;transition:all .14s;white-space:nowrap;}
.seg button.on{background:linear-gradient(135deg,var(--c-deep),var(--c-light));color:#fff;}
.barRect{transition:opacity .15s;}
.barRect:hover{opacity:.8;}
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:15px;}
.ccard{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:17px;position:relative;transition:transform .15s,border .15s;}
.ccard:hover{transform:translateY(-2px);border-color:#46508a;}
.ccard .bar{position:absolute;top:0;left:17px;right:17px;height:3px;border-radius:0 0 3px 3px;}
.ccard .top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;}
.cdot{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;color:#fff;flex-shrink:0;}
.tag{font-size:9.5px;font-weight:700;padding:3px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:.04em;}
.tag.active{background:rgba(62,207,142,.15);color:var(--green);}
.tag.paused{background:rgba(245,193,71,.15);color:var(--amber);}
.tag.percent{background:rgba(169,139,255,.16);color:var(--purple);}
.tag.archived{background:rgba(107,116,160,.2);color:var(--txt-2);}
.cname{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:-.01em;line-height:1.2;cursor:pointer;}
.ctype{font-size:11.5px;color:var(--txt-3);margin-top:4px;}
.health-row{display:flex;align-items:center;gap:9px;margin-top:13px;}
.health-info .hl{font-size:10px;color:var(--txt-3);text-transform:uppercase;letter-spacing:.05em;}
.health-info .hv{font-family:var(--font-num);font-size:15px;font-weight:600;}
.cval-foot{margin-top:12px;padding-top:11px;border-top:1px solid var(--border-soft);display:flex;justify-content:space-between;font-size:11.5px;}
.cval-foot .cf-v{font-family:var(--font-num);font-weight:600;font-size:14px;}
.ccard-actions{display:flex;gap:6px;margin-top:11px;}
.iconbtn{width:30px;height:30px;border-radius:8px;background:var(--bg-2);border:1px solid var(--border);color:var(--txt-2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;}
.iconbtn:hover{color:var(--txt);border-color:#46508a;}
.iconbtn.danger:hover{color:var(--red);border-color:rgba(244,113,116,.4);}
.iconbtn.flex1{flex:1;width:auto;}
.add-card{border:1.5px dashed var(--border);background:transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--txt-3);cursor:pointer;min-height:200px;transition:all .15s;}
.add-card:hover{border-color:var(--c-light);color:var(--c-light);background:rgba(116,170,255,.04);}
.add-card span{font-size:12.5px;font-weight:600;}
.cd-back{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--txt-2);cursor:pointer;margin-bottom:14px;}
.cd-back:hover{color:var(--txt);}
.cd-hero{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:22px;display:flex;gap:18px;align-items:center;flex-wrap:wrap;}
.cd-hero .cdot{width:58px;height:58px;font-size:20px;border-radius:15px;}
.cd-hero .cd-name{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;letter-spacing:-.01em;}
.cd-hero .cd-meta{font-size:12.5px;color:var(--txt-2);margin-top:3px;}
.cd-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:15px;margin-top:15px;}
.info-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border-soft);font-size:12.5px;gap:10px;}
.info-row:last-child{border:none;}
.info-row .k{color:var(--txt-3);}
.info-row .v{font-weight:600;text-align:right;}
.metric-card{background:var(--bg-2);border:1px solid var(--border);border-radius:var(--r);padding:13px 14px;}
.metric-card .mc-top{display:flex;justify-content:space-between;align-items:center;gap:8px;}
.metric-card .mc-name{font-size:11.5px;color:var(--txt-2);}
.metric-card .mc-val{font-family:var(--font-num);font-size:20px;font-weight:600;margin-top:3px;}
.lvl-pill{font-size:9.5px;font-weight:700;padding:3px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.03em;white-space:nowrap;}
.mc-note{font-size:10.5px;color:var(--txt-3);margin-top:5px;}
.access-item{display:flex;align-items:center;gap:10px;padding:9px 11px;background:var(--bg-2);border:1px solid var(--border);border-radius:var(--r-sm);margin-bottom:7px;font-size:12px;}
.access-item .ai-plat{font-weight:600;flex:1;}
.access-item .ai-cred{color:var(--txt-3);font-family:monospace;font-size:11px;}
.mini-del{color:var(--txt-3);cursor:pointer;}
.mini-del:hover{color:var(--red);}
.scope-head{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;margin:14px 0 8px;color:var(--c-light);display:flex;align-items:center;gap:6px;}
/* CRM */
.pipe{display:flex;gap:13px;overflow-x:auto;padding-bottom:10px;-webkit-overflow-scrolling:touch;}
.pipe-col{background:linear-gradient(180deg,var(--card),var(--bg-2));border:1px solid var(--border);border-radius:var(--r-lg);padding:0;min-width:210px;flex:1;display:flex;flex-direction:column;overflow:hidden;}
.pipe-col-head{padding:13px 14px 11px;border-bottom:1px solid var(--border-soft);}
.pipe-col-head .pch{font-size:12px;font-weight:700;display:flex;align-items:center;gap:7px;}
.pch-dot{width:9px;height:9px;border-radius:50%;}
.pipe-col-sub{display:flex;justify-content:space-between;margin-top:6px;font-size:10.5px;color:var(--txt-3);}
.pipe-col-body{padding:11px;display:flex;flex-direction:column;gap:9px;flex:1;min-height:60px;}
.lead-card{background:var(--card-2);border:1px solid var(--border);border-radius:var(--r);padding:12px;cursor:grab;border-left:3px solid var(--c-light);transition:transform .12s,box-shadow .12s;}
.lead-card:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,.25);}
.lead-card .lc-name{font-size:13.5px;font-weight:700;}
.lead-card .lc-ch{font-size:10.5px;color:var(--txt-3);margin-top:3px;display:flex;align-items:center;gap:5px;}
.lead-card .lc-val{font-family:var(--font-num);font-size:15px;font-weight:600;color:var(--c-light);margin-top:7px;}
.lead-card .lc-date{font-size:10px;color:var(--txt-3);margin-top:3px;}
.lead-card .lc-foot{display:flex;justify-content:space-between;align-items:center;margin-top:9px;gap:6px;}
.lead-card .lc-acts{display:flex;gap:5px;}
.lc-mini{width:26px;height:26px;border-radius:7px;background:var(--bg-2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--txt-3);}
.lc-mini:hover{color:var(--txt);}
.lc-mini.del:hover{color:var(--red);}
.lead-card.dragging{opacity:.4;}
.pipe-col.dragover .pipe-col-body{background:rgba(116,170,255,.06);}
.stage-select{font-size:11px;padding:5px 7px;border-radius:6px;}
/* CRM Monthly view */
.crm-month-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px;}
.crm-month-btn{background:var(--card);border:1px solid var(--border);border-radius:var(--r-sm);padding:5px 12px;font-size:12px;font-weight:600;color:var(--txt-2);cursor:pointer;transition:all .14s;}
.crm-month-btn.active{background:linear-gradient(135deg,var(--c-deep),var(--c-light));color:#fff;border-color:transparent;}
/* TASKS */
.tk-toolbar{display:flex;gap:9px;flex-wrap:wrap;align-items:center;}
.tk-toolbar input[type=text]{flex:1;min-width:160px;}
.tk-toolbar input,.tk-toolbar select{width:auto;}
.tlist{display:flex;flex-direction:column;gap:8px;}
.titem{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;transition:all .15s;}
.titem:hover{border-color:#46508a;}
.titem.d{opacity:.5;}
.titem.d .ttext{text-decoration:line-through;color:var(--txt-3);}
.titem.alert-crit{background:var(--pink-bg);border-color:rgba(245,143,194,.4);}
.titem.alert-crit .ttext{color:#ffd0e6;}
.titem.upcoming-task{background:rgba(245,193,71,.06);border-color:rgba(245,193,71,.3);}
.tcheck{width:23px;height:23px;border-radius:7px;border:2px solid var(--border);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.tcheck:hover{border-color:var(--c-light);}
.tcheck.on{background:var(--green);border-color:var(--green);color:#0d1024;}
.prio{width:4px;align-self:stretch;border-radius:3px;flex-shrink:0;min-height:34px;}
.prio-alta{background:var(--red);}
.prio-media{background:var(--amber);}
.prio-baja{background:var(--txt-3);}
.prio-crit{background:var(--pink);}
.tbody{flex:1;min-width:0;}
.ttext{font-size:13.5px;}
.tsub{font-size:11px;color:var(--txt-3);margin-top:3px;display:flex;gap:9px;flex-wrap:wrap;align-items:center;}
.tsub .due-over{color:var(--red);font-weight:600;}
.tsub .due-soon{color:var(--amber);font-weight:600;}
.tmeta{display:flex;align-items:center;gap:7px;flex-shrink:0;}
.pill{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;}
.pill-alta{background:rgba(244,113,116,.15);color:var(--red);}
.pill-media{background:rgba(245,193,71,.15);color:var(--amber);}
.pill-baja{background:var(--bg-2);color:var(--txt-2);}
.pill-crit{background:rgba(245,143,194,.18);color:var(--pink);}
.pill-cli{background:var(--bg-2);color:var(--txt-2);border:1px solid var(--border);}
.tdel{color:var(--txt-3);cursor:pointer;}
.tdel:hover{color:var(--red);}
.tbl{width:100%;border-collapse:collapse;}
.tbl th{text-align:left;font-size:10.5px;font-weight:600;color:var(--txt-3);text-transform:uppercase;letter-spacing:.05em;padding:0 11px 11px;}
.tbl td{padding:12px 11px;border-top:1px solid var(--border-soft);font-size:12.5px;}
.tbl tr:hover td{background:rgba(255,255,255,.015);}
.legend-dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:8px;vertical-align:middle;}
.amount-pos{color:var(--green);font-weight:600;}
.amount-neg{color:var(--orange);font-weight:600;}
.st-pill{font-size:9.5px;font-weight:700;padding:3px 8px;border-radius:20px;}
.st-paid{background:rgba(62,207,142,.15);color:var(--green);}
.st-pend{background:rgba(245,193,71,.15);color:var(--amber);}
/* BUDGET */
.bud-grid{display:grid;grid-template-columns:1fr 340px;gap:16px;}
.svc-row{display:flex;align-items:flex-start;gap:10px;padding:12px;background:var(--bg-2);border:1px solid var(--border);border-radius:var(--r-sm);margin-bottom:8px;transition:border-color .15s;}
.svc-row-on{border-color:rgba(116,170,255,.35);background:rgba(116,170,255,.04);}
.svc-check{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;}
.svc-check.on{background:var(--c-light);border-color:var(--c-light);color:#0d1024;}
.svc-row .sr-name{font-size:13px;font-weight:600;line-height:1.3;}
.svc-row .sr-sub{font-size:10.5px;color:var(--txt-3);margin-top:2px;line-height:1.4;}
.svc-price-col{display:flex;flex-direction:column;align-items:flex-end;flex-shrink:0;}
.svc-price-col input{width:90px;text-align:right;padding:7px 9px;font-size:13px;}
.svc-filter-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px;}
.svc-filter-tab{background:var(--bg-2);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:11.5px;font-weight:600;color:var(--txt-2);cursor:pointer;transition:all .13s;}
.svc-filter-tab.on{background:var(--c-deep);color:#fff;border-color:var(--c-deep);}
.bud-summary{background:linear-gradient(160deg,var(--card),var(--bg-2));border:1px solid var(--border);border-radius:var(--r-lg);padding:20px;position:sticky;top:14px;}
.bud-line{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border-soft);font-size:13px;}
.bud-line.total{border:none;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;padding-top:14px;}
.bud-line .bl-v{font-weight:600;}
.price-range-display{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin:10px 0;}
.prd-item{background:var(--bg-2);border:1px solid var(--border);border-radius:var(--r-sm);padding:8px;text-align:center;}
.prd-item .prd-label{font-size:9px;color:var(--txt-3);text-transform:uppercase;letter-spacing:.06em;}
.prd-item .prd-val{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;margin-top:2px;}
.prd-item.highlight{border-color:var(--c-light);background:rgba(116,170,255,.06);}
.prd-item.highlight .prd-val{color:var(--c-light);}
.slider{-webkit-appearance:none;appearance:none;width:100%;height:6px;border-radius:5px;background:var(--bg-2);outline:none;padding:0;}
.slider::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--c-light);cursor:pointer;border:3px solid var(--card);box-shadow:0 2px 6px rgba(0,0,0,.4);}
.slider::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:var(--c-light);cursor:pointer;border:3px solid var(--card);}
.swatches{display:flex;gap:7px;flex-wrap:wrap;align-items:center;}
.swatch{width:29px;height:29px;border-radius:8px;cursor:pointer;border:2px solid transparent;transition:transform .12s;}
.swatch:hover{transform:scale(1.12);}
.swatch.sel{border-color:#fff;box-shadow:0 0 0 2px var(--card);}
.hex-wrap{display:flex;align-items:center;gap:8px;margin-top:9px;}
.hex-wrap input{width:120px;font-family:monospace;}
.hex-preview{width:34px;height:34px;border-radius:9px;border:1px solid var(--border);flex-shrink:0;}
.overlay{position:fixed;inset:0;background:rgba(8,10,26,.8);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:60;padding:18px;}
.modal-overlay{position:fixed;inset:0;background:rgba(8,10,26,.8);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:60;padding:18px;}
.overlay.show{display:flex;}
.modal{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:24px;width:100%;max-width:480px;max-height:90dvh;overflow-y:auto;animation:pop .2s ease;}
.modal.wide{max-width:640px;}
.modal.full{max-width:860px;}
@keyframes pop{from{opacity:0;transform:scale(.96);}to{opacity:1;transform:none;}}
.modal h3{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.modal-foot{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;flex-wrap:wrap;}
.form-grid{display:grid;gap:13px;}
.split{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.field{display:flex;flex-direction:column;}
.mini{font-size:11px;color:var(--txt-3);}
/* CALENDAR */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-head{text-align:center;font-size:10.5px;font-weight:700;color:var(--txt-3);padding:6px 0;text-transform:uppercase;}
.cal-day{min-height:60px;border-radius:var(--r-sm);padding:6px;cursor:pointer;transition:background .12s;position:relative;}
.cal-day:hover{background:var(--bg-2);}
.cal-today{background:rgba(116,170,255,.15);border:1px solid var(--c-light);}
.cal-today .cal-num{color:var(--c-light);font-weight:700;}
.cal-num{font-size:12.5px;color:var(--txt-2);}
.cal-dots{display:flex;gap:3px;margin-top:4px;flex-wrap:wrap;}
.cal-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.cal-has-ev .cal-num::after{content:'';position:absolute;top:4px;right:4px;width:5px;height:5px;border-radius:50%;background:var(--amber);}
.cal-ev-label{font-size:9.5px;color:var(--txt-2);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;display:block;}
.cal-upcoming-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(245,193,71,.15);border:1px solid rgba(245,193,71,.3);color:var(--amber);font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:20px;}
/* OBJETIVOS */
.obj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}
.obj-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px;position:relative;}
.obj-card .obj-label{font-size:11px;color:var(--txt-3);text-transform:uppercase;letter-spacing:.06em;}
.obj-card .obj-name{font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;margin:4px 0 12px;padding-right:54px;line-height:1.25;}
.obj-progress-bar{height:8px;background:var(--bg-2);border-radius:4px;overflow:hidden;margin-bottom:8px;}
.obj-progress-fill{height:100%;border-radius:4px;transition:width .4s;}
.obj-nums{display:flex;justify-content:space-between;font-size:12px;color:var(--txt-2);}
.obj-nums .obj-current{font-family:var(--font-num);font-weight:600;font-size:18px;color:var(--txt);}
.obj-nums .obj-target{font-size:11px;color:var(--txt-3);}
.obj-pct{position:absolute;top:16px;right:18px;font-family:var(--font-num);font-size:18px;font-weight:600;letter-spacing:-.02em;}
.obj-card{cursor:pointer;}
.obj-card .obj-actions{position:absolute;bottom:14px;right:14px;display:flex;gap:6px;opacity:0;transition:opacity .18s;}
.obj-card:hover .obj-actions{opacity:1;}
.obj-period-tabs{display:flex;gap:4px;margin-bottom:16px;}
.logros-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;}
.nota-dia{margin-bottom:18px;}
.nota-dia-head{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;color:var(--c-light);text-transform:capitalize;margin-bottom:8px;padding-left:2px;}
.nota-item{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--c-light);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;display:flex;justify-content:space-between;gap:10px;align-items:flex-start;animation:riseIn .35s ease backwards;}
.nota-text{font-size:13.5px;line-height:1.5;flex:1;white-space:pre-wrap;overflow-wrap:break-word;}
.nota-acts{display:flex;gap:8px;flex-shrink:0;}
.cal-ev-actions{display:flex;gap:6px;flex-wrap:wrap;width:100%;margin-top:8px;}
.cal-ev-actions .btn{flex:1;justify-content:center;min-width:120px;}
.logro-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;display:flex;align-items:center;gap:12px;animation:riseIn .4s ease backwards;}
.logro-icon{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.logro-name{font-weight:700;font-size:14px;}
.logro-per{font-size:11px;color:var(--txt-3);margin-top:2px;}
.obj-period-tab{background:var(--card);border:1px solid var(--border);border-radius:var(--r-sm);padding:5px 14px;font-size:12px;font-weight:700;cursor:pointer;transition:all .14s;}
.obj-period-tab.on{background:linear-gradient(135deg,var(--c-deep),var(--c-light));color:#fff;border-color:transparent;}
/* WORKERS */
.worker-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:15px;}
.worker-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px;transition:transform .15s;position:relative;}
.worker-card:hover{transform:translateY(-2px);border-color:#46508a;}
.worker-avatar{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:16px;color:#fff;margin-bottom:12px;}
.worker-name{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;}
.worker-role{font-size:11.5px;color:var(--txt-3);margin-top:3px;}
.worker-badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}
.worker-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;background:var(--bg-2);border:1px solid var(--border);color:var(--txt-2);}
.worker-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;}
.worker-stat{background:var(--bg-2);border-radius:var(--r-sm);padding:8px;}
.worker-stat .ws-l{font-size:9.5px;color:var(--txt-3);text-transform:uppercase;}
.worker-stat .ws-v{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;margin-top:1px;}
/* DOCUMENTS PRINT */
@media print{
  body *{visibility:hidden!important;}
  #printArea,#printArea *{visibility:visible!important;}
  #printArea{position:absolute!important;left:0;top:0;width:100%;display:block!important;}
  .bg-orbs{display:none!important;}
  @page{margin:10mm;size:A4;}
  #printArea>div{page-break-after:avoid;page-break-inside:avoid;}
  #printArea>div>div{page-break-inside:avoid;}
  html,body{height:auto!important;overflow:visible!important;}
}
#printArea{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
.rep-sec{margin-top:14px;}
.rep-sec h4{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--c-light);margin-bottom:7px;}
.rep-sec p{font-size:13px;line-height:1.55;color:var(--txt-2);}
.rep-step{display:flex;gap:9px;font-size:13px;color:var(--txt);margin-bottom:7px;}
.rep-step .rn{width:20px;height:20px;border-radius:50%;background:var(--c-deep);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.mtoggle{display:none;}
@media(max-width:980px){.bud-grid{grid-template-columns:1fr;}.bud-summary{position:static;}}
@media(max-width:860px){
  .cal-day{min-height:52px;}
  .cd-grid{grid-template-columns:1fr;}
  .shell{grid-template-columns:1fr;}
  .sidebar{position:fixed;left:0;top:0;bottom:0;width:262px;max-width:85vw;transform:translateX(-100%);transition:transform .25s;padding-top:env(safe-area-inset-top);}
  .sidebar.open{transform:none;}
  .mtoggle{display:inline-flex;align-items:center;justify-content:center;width:42px;height:42px;border-radius:var(--r-sm);background:var(--card);border:1px solid var(--border);color:var(--txt);cursor:pointer;flex-shrink:0;}
  .mscrim{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:15;display:none;}
  .mscrim.show{display:block;}
  .topbar{padding:calc(12px + env(safe-area-inset-top)) 16px 12px;}
  .topbar h1{font-size:19px;}
  .scroll{padding:4px 14px calc(96px + env(safe-area-inset-bottom));}
  input,select,textarea{font-size:16px;padding:11px 12px;}
  .btn{padding:10px 15px;}
  .kpi-grid{grid-template-columns:repeat(2,1fr);gap:11px;}
  .kpi{padding:14px 15px;}
  .kpi .val{font-size:20px;}
  .kpi .ic{width:30px;height:30px;margin-bottom:9px;}
  .panel{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .tbl{min-width:540px;}
  .cd-hero{gap:13px;}
  .cd-hero .cd-name{font-size:22px;}
  .row-head{margin:20px 0 11px;}
  .modal{padding:20px;max-height:88dvh;}
  .pipe-col{min-width:75vw;}
}
@media(max-width:430px){
  .topbar h1{font-size:18px;}
  .scroll{padding-left:10px;padding-right:10px;}
  .panel{padding:14px;}
  .chart-card{padding:12px;}
  *{max-width:100%;}
  .cal-grid{gap:2px;}
  .cal-day{min-height:46px;padding:3px;}
  .cal-num{font-size:11px;}
  .cal-ev-label{font-size:8px;}
  table{font-size:11px;}
  .modal{padding:16px;}
  .bud-grid{grid-template-columns:1fr;}
  .obj-grid{grid-template-columns:1fr;}
  .worker-grid{grid-template-columns:1fr;}
  .kpi-grid{grid-template-columns:1fr 1fr;}
  .kpi-grid{gap:9px;}
  .kpi .lbl{font-size:9.5px;}
  .kpi .val{font-size:18px;}
  .cgrid{grid-template-columns:1fr;}
  .cd-grid{grid-template-columns:1fr;}
  .date-chip .t{display:none;}
  .seg{width:100%;}
  .seg button{flex:1;text-align:center;}
  .split{grid-template-columns:1fr;}
  .tk-toolbar{flex-direction:column;align-items:stretch;}
  .tk-toolbar input,.tk-toolbar select,.tk-toolbar .btn{width:100%;}
  .tk-toolbar .btn{justify-content:center;}
  .modal-foot .btn{flex:1;justify-content:center;}
  .pipe-col{min-width:80vw;}
  .obj-grid{grid-template-columns:1fr;}
  .worker-grid{grid-template-columns:1fr;}
}
/* Notification toast */
.toast-container{position:fixed;bottom:24px;right:24px;z-index:999;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.toast{background:var(--card-2);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px;font-size:13px;color:var(--txt);box-shadow:0 8px 24px rgba(0,0,0,.4);display:flex;align-items:center;gap:10px;pointer-events:all;animation:slideIn .3s ease;max-width:320px;}
.toast.success{border-left:3px solid var(--green);}

.toast.error{border-left:3px solid var(--red);}
.toast.info{border-left:3px solid var(--c-light);}
@keyframes slideIn{from{opacity:0;transform:translateX(40px);}to{opacity:1;transform:none;}}

async function loadDB(){
  try{
    const{data:{user}}=await sb.auth.getUser();
    if(!user){showAuthScreen();return false;}
    if(isSessixpired()){await sb.auth.signOut();showAuthScreen();return false;}
    currentUser=user;updateActivity();
    const{data,error}=await sb.from('user_data').select('data').eq('user_id',user.id).single();
    if(error||!data){db=seedDB();await doPersist();}
    else db=data.data;
  }catch(e){console.error('loadDB:',e);db=seedDB();}
  migrate();return true;
}
let _saveTimer=null;
function persistDB(){if(_saveTimer)clearTimeout(_saveTimer);_saveTimer=setTimeout(doPersist,800);}

  catch(e){console.warn('Supabase save:',e.message);}
}

  $('authSub').textContent=lg?'Accede a tu centro de control':'Crea tu acceso a M1 Media';

async function doAuth(){
  const email=($('authEmail').value||'').trim(),pass=$('authPass').value||'';
  $('authErr').textContent='';
  if(!email||!pass){$('authErr').textContent='Rellena email y contraseña.';return;}
  const btn=$('authMainBtn');btn.disabled=true;btn.textContent='...';
  try{
    const res=_authMode==='login'
      ?await sb.auth.signInWithPassword({email,password:pass})
      :await sb.auth.signUp({email,password:pass});
    if(res.error)throw res.error;
    const{data:{user}}=await sb.auth.getUser();
    if(!user)throw new Error('Sin usuario tras autenticar');
    currentUser=user;updateActivity();await loadAndShow();
  }catch(e){
    $('authErr').textContent=_authMode==='login'?'Email o contraseña incorrectos.':'Error al registrar. Contraseña de más de 6 caracteres.';
  }finally{btn.disabled=false;btn.textContent=_authMode==='login'?'Entrar':'Registrarme';}
}

/* ============ HELPERS ============ */
const $=id=>document.getElementById(id);
const eur=n=>Math.round(n).toLocaleString('es-ES')+'€';
function fmtK(n){n=Math.round(n);return Math.abs(n)>=1000?(n/1000).toFixed(n%1000===0?0:1)+'k':''+n;}
function ym(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
function shiftYM(s,d){let[y,m]=s.split('-').map(Number);m+=d;while(m<1){m+=12;y--;}while(m>12){m-=12;y++;}return y+'-'+String(m).padStart(2,'0');}
function ymLabel(s){if(!s)return'—';const[y,m]=s.split('-');return['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][+m-1]+' '+y.slice(2);}
function dayKey(){return new Date().toISOString().slice(0,10);}
function shiftDay(d,n){const dt=new Date(d);dt.setDate(dt.getDate()+n);return dt.toISOString().slice(0,10);}
function uid(){return ++db.seq;}
function curMonth(){return ym(new Date());}
function cliName(id){if(id===0)return'General';const c=db.clients.find(x=>x.id===id);return c?c.name:'—';}
function cliColor(id){const c=db.clients.find(x=>x.id===id);return c?c.color:'#5E72E8';}
function initials(n){return n.trim().split(/\s+/).slice(0,2).map(w=>w[0]).join('').toUpperCase();}
function esc(s){return(s==null?'':''+s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function activeClients(){return db.clients.filter(c=>c.status!=='archived');}
function daysUntil(dateStr){if(!dateStr)return null;return Math.ceil((new Date(dateStr+'T12:00:00')-new Date())/86400000);}
function seqDay(d1Date){
  if(!d1Date)return null;
  const d1=new Date(d1Date+'T00:00:00');
  const today=new Date();today.setHours(0,0,0,0);d1.setHours(0,0,0,0);
  return Math.max(1,Math.floor((today-d1)/86400000)+1);
}
const SEQ_STEPS=['Primer contacto','Seguimiento WhatsApp','Envío propuesta','Seguimiento propuesta','Cierre / decisión'];

function classify(v,m){
  if(m.raw)return LEVELS[2];
  const t=m.th;let lvl;
  if(m.hi)lvl=v<t[0]?0:v<t[1]?1:v<t[2]?2:v<t[3]?3:4;
  else lvl=v>t[0]?0:v>t[1]?1:v>t[2]?2:v>t[3]?3:4;
  return LEVELS[lvl];
}
function clientHealth(c){
  if(!c.metricLog||!c.metricLog.length)return null;
  const months=[...new Set(c.metricLog.map(l=>l.month))].sort();
  const lastM=months[months.length-1];
  const last=c.metricLog.filter(l=>l.month===lastM);
  const defs=METRICS[c.service]||[];
  let sum=0,n=0;
  last.forEach(entry=>defs.forEach(m=>{
    if(m.raw)return;
    const v=entry.values[m.k];
    if(v!=null&&v!==''){sum+=classify(+v,m).s;n++;}
  }));
  if(!n)return null;
  let score=Math.round(sum/n);
  if(c.meetings&&c.meetings.length){
    const recent=c.meetings.some(mt=>(Date.now()-new Date(mt.date))/86400000<35);
    if(!recent)score=Math.max(0,score-8);
  }
  return score;
}
function healthLabel(s){
  if(s==null)return{t:'Sin datos',c:'#6b74a0'};
  if(s>=80)return{t:'Excelente',c:'#3ECF8E'};
  if(s>=60)return{t:'Bueno',c:'#5BC98E'};
  if(s>=40)return{t:'Regular',c:'#F5C147'};
  if(s>=25)return{t:'En riesgo',c:'#F2974D'};
  return{t:'Crítico',c:'#F47174'};
}

/* ============ CHART ENGINE ============ */
function barChart(data,opt){
  opt=opt||{};
  const W=680,H=opt.h||240,pad={t:24,r:16,b:42,l:48};
  const cw=W-pad.l-pad.r,ch=H-pad.t-pad.b;
  const series=opt.series||[{key:'value',color:'#74AAFF'}];
  let max=0;data.forEach(d=>series.forEach(s=>max=Math.max(max,d[s.key]||0)));
  max=max*1.18||10;
  let g='',b='';
  for(let i=0;i<=4;i++){
    const y=pad.t+ch-(ch*i/4);
    g+=`<line x1="${pad.l}" y1="${y}" x2="${W-pad.r}" y2="${y}" stroke="#36406e"/>`;
    g+=`<text x="${pad.l-7}" y="${y+3.5}" font-size="10" fill="#6b74a0" text-anchor="end">${fmtK(max*i/4)}</text>`;
  }
  const bw=cw/Math.max(data.length,1);
  data.forEach((d,i)=>{
    const gx=pad.l+i*bw,sw=(bw*0.62)/series.length;
    series.forEach((s,si)=>{
      const v=d[s.key]||0,h=(v/max)*ch,x=gx+bw*0.19+si*sw,y=pad.t+ch-h;
      b+=`<rect x="${x}" y="${y}" width="${sw*0.86}" height="${Math.max(h,1)}" rx="3" fill="${s.color}" class="barRect"><title>${esc(d.label)}: ${eur(v)}</title></rect>`;
    });
    b+=`<text x="${gx+bw/2}" y="${H-pad.b+17}" font-size="9.5" fill="#a4adcf" text-anchor="middle">${esc(d.label)}</text>`;
  });
  return`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">${g}${b}</svg>`+legend(series);
}
function lineChart(data,opt){
  opt=opt||{};
  const W=680,H=opt.h||240,pad={t:24,r:18,b:42,l:48};
  const cw=W-pad.l-pad.r,ch=H-pad.t-pad.b;
  const series=opt.series||[{key:'value',color:'#74AAFF'}];
  let max=0;data.forEach(d=>series.forEach(s=>max=Math.max(max,d[s.key]||0)));
  max=max*1.15||10;
  let g='';
  for(let i=0;i<=4;i++){
    const y=pad.t+ch-(ch*i/4);
    g+=`<line x1="${pad.l}" y1="${y}" x2="${W-pad.r}" y2="${y}" stroke="#36406e"/>`;
    g+=`<text x="${pad.l-7}" y="${y+3.5}" font-size="10" fill="#6b74a0" text-anchor="end">${fmtK(max*i/4)}</text>`;
  }
  const xs=data.map((_,i)=>pad.l+(i/(Math.max(data.length-1,1)))*cw);
  const ys=(v)=>pad.t+ch-(Math.min(v,max)/max)*ch;
  let defs='',areas='',lines='',dots='',labels='';
  series.forEach((s,si)=>{
    const pts=data.map((_,i)=>xs[i]+','+ys(data[i][s.key]||0)).join(' ');
    const gid='grad'+si+'_'+Math.floor(Math.random()*9999);
    defs+=`<linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${s.color}" stop-opacity="0.28"/><stop offset="100%" stop-color="${s.color}" stop-opacity="0"/></linearGradient>`;
    const areaPts=`${xs[0]},${pad.t+ch} ${pts} ${xs[xs.length-1]},${pad.t+ch}`;
    areas+=`<polygon points="${areaPts}" fill="url(#${gid})" stroke="none"/>`;
    lines+=`<polyline points="${pts}" fill="none" stroke="${s.color}" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>`;
    data.forEach((d,i)=>dots+=`<circle cx="${xs[i]}" cy="${ys(d[s.key]||0)}" r="3.5" fill="${s.color}"><title>${esc(d.label)}: ${fmtK(d[s.key]||0)}</title></circle>`);
  });
  const skip=Math.ceil(data.length/10);
  data.forEach((d,i)=>{if(i%skip===0||i===data.length-1)labels+=`<text x="${xs[i]}" y="${H-pad.b+17}" font-size="9.5" fill="#a4adcf" text-anchor="middle">${esc(d.label)}</text>`;});
  return`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto"><defs>${defs}</defs>${g}${areas}${lines}${dots}${labels}</svg>`+legend(series);
}
function donutChart(data,size){
  size=size||120;const r=size/2-10,cx=size/2,cy=size/2;
  const total=data.reduce((a,b)=>a+b.v,0)||1;
  let angle=-Math.PI/2,path='';
  data.forEach(d=>{
    const a=2*Math.PI*d.v/total,x1=cx+r*Math.cos(angle),y1=cy+r*Math.sin(angle);
    angle+=a;const x2=cx+r*Math.cos(angle),y2=cy+r*Math.sin(angle);
    const lg=a>Math.PI?1:0;
    path+=`<path d="M${cx},${cy}L${x1},${y1}A${r},${r},0,${lg},1,${x2},${y2}Z" fill="${d.c}" opacity=".85"/>`;
  });
  return`<svg viewBox="0 0 ${size} ${size}" style="width:${size}px;height:${size}px">${path}</svg>`;
}
function legend(series){
  if(!series||series.length<2)return'';
  return`<div style="display:flex;gap:14px;flex-wrap:wrap;margin-top:10px;">${series.map(s=>`<span style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--txt-2)"><span style="width:10px;height:10px;border-radius:50%;background:${s.color};flex-shrink:0"></span>${esc(s.label||s.key)}</span>`).join('')}</div>`;
}
function healthRing(score,size){
  size=size||38;const r=size/2-3,cx=size/2,cy=size/2;
  const c=score==null?'#6b74a0':score>=80?'#3ECF8E':score>=60?'#5BC98E':score>=40?'#F5C147':score>=25?'#F2974D':'#F47174';
  const pct=score==null?0:score/100;
  const circ=2*Math.PI*r;
  return`<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}"><circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#2e3760" stroke-width="3.5"/><circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${c}" stroke-width="3.5" stroke-dasharray="${circ*pct} ${circ*(1-pct)}" stroke-dashoffset="${circ*0.25}" transform="rotate(-90 ${cx} ${cy})"/><text x="${cx}" y="${cy+4.5}" text-anchor="middle" font-size="${size>44?13:10}" font-weight="700" fill="${c}">${score==null?'?':score}</text></svg>`;
}

function tickDate(){

/* ============ ALERTS ============ */
let lastAlerts=[];
function computeAlerts(){
  const out=[];
  db.clients.filter(c=>c.status!=='archived').forEach(c=>{
    const h=clientHealth(c),contact=c.contact.person||'el cliente';
    if(h!=null&&h<40){
      out.push({key:'health-'+c.id,crit:true,prio:'crit',text:'⚠ '+c.name+' en riesgo de fuga (health '+h+'/100)',report:{
        diag:'El health score de '+c.name+' es de '+h+'/100, por debajo del umbral de seguridad.',
        why:'Un health score bajo suele anticipar una cancelación. Actuar pronto evita perder la cuenta.',
        actions:['Abre la ficha de '+c.name+' y revisa las métricas del último mes.','Agenda una reunión con '+contact+' esta misma semana.','Prepara un plan de acción y preséntalo.','Registra la reunión en la ficha del cliente.']
      }});
    }else if(h!=null&&h<60){
      out.push({key:'health-'+c.id,crit:false,prio:'media',text:c.name+' con rendimiento regular ('+h+'/100)',report:{
        diag:'El health score de '+c.name+' es de '+h+'/100. Está en zona aceptable pero con margen de mejora.',
        why:'Un rendimiento regular mantenido puede erosionar la confianza del cliente.',
        actions:['Revisa qué métricas están tirando del score hacia abajo.','Ajusta la estrategia del mes.','Comunica las mejoras al cliente.']
      }});
    }
    if(c.status==='active'&&c.meetings&&c.meetings.length){
      const recent=c.meetings.some(mt=>(Date.now()-new Date(mt.date))/86400000<35);
      if(!recent)out.push({key:'meet-'+c.id,crit:false,prio:'baja',text:'Sin reunis recientes con '+c.name+' (+35 días)',report:{
        diag:'Han pasado más de 35 días desde la última reunión con '+c.name+'.',
        why:'La falta de contacto reduce la percepción de valor del servicio.',
        actions:['Escribe o llama a '+contact+' para agendar una puesta al día.','Comparte un informe de resultados.','Registra la reunión cuando se realice.']
      }});
    }
  });
  const pend=db.incomes.filter(i=>i.status==='pending');
  if(pend.length){
    const tot=pend.reduce((a,b)=>a+b.amount,0);
    out.push({key:'pending-inv',crit:false,prio:'media',text:pend.length+' factura(s) pendiente(s) · '+eur(tot),report:{
      diag:'Hay '+pend.length+' ingreso(s) pendientes de cobro por '+eur(tot)+'.',
      why:'Las facturas sin cobrar afectan directamente a tu cashflow.',
      actions:['Envía un recordatorio amable de pago.','Confirma la fecha prevista de cobro.','En Finanzas, marca el ingreso como Cobrado cuando se resuelva.']
    }});
  }
  const overdue=db.tasks.filter(t=>!t.d&&!t.isAlert&&t.due&&t.due<dayKey());
  if(overdue.length){
    out.push({key:'overdue-tasks',crit:true,prio:'crit',text:'⚠ '+overdue.length+' tarea(s) vencida(s)',report:{
      diag:'Tienes '+overdue.length+' tarea(s) cuya fecha ya ha pasado.',
      why:'Las tareas vencidas generan retrasos en cadena.',
      actions:['Ve a Tareas y revisa cuáles están vencidas.','Reprograma sus fechas de entrega.','Prioriza las de clientes activos.']
    }});
  }
  // Reunis próximas (2 días)
  const soon=gatherAllEvents().filter(e=>e.date&&daysUntil(e.date)===2);
  if(soon.length){
    out.push({key:'meeting-soon',crit:false,prio:'media',text:'📅 '+soon.length+' reunión(es) en 2 días',report:{
      diag:soon.map(e=>e.title).join(', ')+' — en 2 días.',
      why:'Prepara los materiales y confirma la asistencia.',
      actions:['Revisa el calendario y confirma con los asistentes.','Prepara la agenda de la reunión.','Configura el enlace si es online.']
    }});
  }
  const now=Date.now();
  return out.filter(a=>{const d=db.dismissedAlerts[a.key];return!(d&&now-d<86400000);});
}
function syncAlertTasks(){
  const now=Date.now();
  Object.keys(db.dismissedAlerts).forEach(k=>{if(now-db.dismissedAlerts[k]>86400000)delete db.dismissedAlerts[k];});
  const alerts=computeAlerts();
  const keys=alerts.map(a=>a.key);
  db.tasks=db.tasks.filter(t=>!t.isAlert||keys.includes(t.alertKey));
  alerts.forEach(a=>{
    const ex=db.tasks.find(t=>t.isAlert&&t.alertKey===a.key);
    if(ex){ex.text=a.text;ex.prio=a.prio;ex.crit=a.crit;}
    else db.tasks.unshift({id:uid(),text:a.text,prio:a.prio,cli:0,d:false,dAt:0,due:'',isAlert:true,alertKey:a.key,crit:a.crit});
  });
}
function openAlertReport(i){
  const a=lastAlerts[i];if(!a||!a.report)return;
  const r=a.report;
  modal(`<div class="modal wide">
    <h3>${ic(a.crit?'alertT':'alertC',18)}${esc(a.text)}</h3>
    <div class="rep-sec"><h4>Qué está pasando</h4><p>${esc(r.diag)}</p></div>

      ${r.actions.map((s,n)=>`<div class="rep-step"><span class="rn">${n+1}</span><span>${esc(s)}</span></div>`).join('')}
    </div>
    <div class="modal-foot">

      <button class="btn btn-primary" onclick="dismissAlert('${esc(a.key)}')">${ic('checkC',15)}Marcar como resuelta</button>
    </div>
  </div>`);
}
async function dismissAlert(key){
  db.dismissedAlerts[key]=Date.now();
  db.tasks=db.tasks.filter(t=>!(t.isAlert&&t.alertKey===key));
  await persistDB();closeModalNow();render();
}

/* Convert won lead to client */
async function convertLeadToClient(leadId){
  const l=db.leads.find(x=>x.id===leadId);
  if(!l)return;
  if(!confirm('¿Convertir "'+l.name+'" en cliente? Se creará una ficha de cliente con los datos del lead.'))return;
  const newClient={
    id:uid(),name:l.name,service:l.niche==='edu'?'ads':l.niche==='ecom'?'ads':'social',
    niche:l.niche,status:'active',retainer:l.value||0,
    color:PRESET_COLORS[db.clients.length%PRESET_COLORS.length],
    contact:{person:'',email:'',ph:l.ph||''},
    accesses:[],meetings:[],metricLog:[]
  };
  db.clients.push(newClient);
  l.stage='Ganado';l.wonAt=curMonth();
  await persistDB();
  toast('✅ '+l.name+' convertido a cliente. Completa la ficha en la sección Clientes.','success');
  // Open client modal to complete info
  curTab='clientes';curClient=newClient.id;
  render();
  setTimeout(()=>openClientModal(newClient.id),300);
}

/* ============ VIEW: OBJETIVOS ============ */
function viewObjetivos(){
  const cm=curMonth(),cy=new Date().getFullYear();
  const qNum=Math.floor((new Date().getMonth())/3)+1;
  const qStart=cy+'-'+String((qNum-1)*3+1).padStart(2,'0');
  const qMonths=[0,1,2].map(i=>shiftYM(qStart,i));
  
  function getObjValue(obj){
    if(obj.unit==='€'){
      if(objPeriod==='monthly')return monthRevenue(cm);
      if(objPeriod==='quarterly')return qMonths.reduce((a,m)=>a+monthRevenue(m),0);
      if(objPeriod==='annual')return lastMonths(12).reduce((a,m)=>a+monthRevenue(m),0);
    }
    if(obj.name.toLowerCase().includes('cliente')){
      return db.clients.filter(c=>c.status==='active').length;
    }
    if(obj.name.toLowerCase().includes('lead')){
      if(obj.name.toLowerCase().includes('cerrado')||obj.name.toLowerCase().includes('ganado')){
        return db.leads.filter(l=>l.stage==='Ganado'&&(l.date||curMonth())===cm).length;
      }
      return db.leads.filter(l=>(l.date||curMonth())===cm).length;
    }
    if(obj.name.toLowerCase().includes('mrr')){
      return db.clients.filter(c=>c.status==='active').reduce((a,b)=>a+(b.retainer||0),0);
    }
    return 0;
  }

  const objs=db.objectives[objPeriod]||[];
  return `
    <div class="row-head" style="margin-top:10px">
      <h2>Objetivos</h2>
      <button class="btn btn-primary btn-sm" onclick="openObjModal(null,'${objPeriod}')">${ic('plus',15)}Nuevo objetivo</button>
    </div>
    <div class="obj-period-tabs">
      ${[['monthly','Mensual'],['quarterly','Trimestral'],['annual','Anual']].map(([k,n])=>`
        <div class="obj-period-tab${objPeriod===k?' on':''}" onclick="objPeriod='${k}';render()">${n}</div>`).join('')}
    </div>
    <div style="font-size:12px;color:var(--txt-3);margin-bottom:14px">
      ${objPeriod==='monthly'?ymLabel(cm):objPeriod==='quarterly'?'T'+qNum+' '+cy:cy+' (12 meses)'}
    </div>
    ${objs.length?`<div class="obj-grid">
      ${objs.map(obj=>{
        const current=getObjValue(obj);
        const pct=Math.min(Math.round(current/obj.target*100),100);
        const color=pct>=100?'var(--green)':pct>=60?'var(--amber)':'var(--red)';
        return`<div class="obj-card" onclick="openObjDetail(${obj.id},'${objPeriod}')">
          <div class="obj-pct" style="color:${color}">${pct}%</div>
          <div class="obj-label">${objPeriod==='monthly'?'Mensual':objPeriod==='quarterly'?'Trimestral':'Anual'}</div>
          <div class="obj-name">${esc(obj.name)}</div>
          <div class="obj-progress-bar">
            <div class="obj-progress-fill" style="width:${pct}%;background:${obj.color||'var(--c-light)'}"></div>
          </div>
          <div class="obj-nums">
            <div>
              <div class="obj-current">${obj.unit==='€'?eur(current):(current+(obj.unit||''))}</div>
              <div class="obj-target">/ ${obj.unit==='€'?eur(obj.target):(obj.target+(obj.unit||''))} objetivo</div>
            </div>
            <div style="text-align:right">
              ${pct>=100?`<span style="color:var(--green);font-size:11px;font-weight:700">Conseguido</span>`
                :pct>=60?`<span style="color:var(--amber);font-size:11px">En camino</span>`
                :`<span style="color:var(--red);font-size:11px">Por debajo</span>`}
            </div>
          </div>
          <div class="obj-actions">
            <div onclick="event.stopPropagation();openObjModal(${obj.id},'${objPeriod}')" class="iconbtn" title="Editar">${svg('edit',13)}</div>
            <div onclick="event.stopPropagation();delObj(${obj.id},'${objPeriod}')" class="iconbtn danger" title="Eliminar">${svg('trash',13)}</div>
          </div>
        </div>`;
      }).join('')}
    </div>`:`<div class="panel"><div class="empty">${ic('goal',32)}<div>Sin objetivos para este periodo</div><button class="btn btn-primary" style="margin-top:14px" onclick="openObjModal(null,'${objPeriod}')">${ic('plus',15)}Añadir objetivo</button></div></div>`}
    
    <div class="row-head" style="margin-top:24px"><h2>Logros conseguidos</h2><span class="meta">Objetivos cumplidos</span></div>
    ${(()=>{
      const logros=[];
      ['monthly','quarterly','annual'].forEach(per=>{
        (db.objectives[per]||[]).forEach(o=>{
          const val=getObjValue(o);
          if(val>=o.target){
            logros.push({nombre:o.name,periodo:per==='monthly'?'Mensual':per==='quarterly'?'Trimestral':'Anual',color:o.color||'#3ECF8E'});
          }
        });
      });
      if(!logros.length)return '<div class="panel"><div class="empty">'+ic('trophy',32)+'<div>Aún no hay objetivos cumplidos. Cuando alcances uno, aparecerá aquí.</div></div></div>';
      return '<div class="logros-grid">'+logros.map(l=>`<div class="logro-card" style="border-color:${l.color}55">
        <div class="logro-icon" style="background:${l.color}22;color:${l.color}">${svg('trophy',20)}</div>
        <div><div class="logro-name">${esc(l.nombre)}</div><div class="logro-per">${l.periodo} · Conseguido</div></div>
      </div>`).join('')+'</div>';
    })()}

    <div class="row-head" style="margin-top:24px"><h2>Evolución de facturación</h2></div>
    <div class="chart-card">
      ${(()=>{
        const months=lastMonths(6);
        const data=months.map(m=>({label:ymLabel(m),value:monthRevenue(m),cost:monthCost(m)}));
        return lineChart(data,{series:[{key:'value',color:'#74AAFF',label:'Ingresos'},{key:'cost',color:'#F2974D',label:'Costes'}],h:200});
      })()}
    </div>`;
}
function openObjModal(id,period){
  const obj=id?db.objectives[period||objPeriod].find(x=>x.id===id):null;
  modal(`<div class="modal">
    <h3>${ic('goal',18)}${id?'Editar objetivo':'Nuevo objetivo'}</h3>
    <div class="form-grid">

async function saveObj(id,period){
  const name=$('objName').value.trim();const target=parseFloat($('objTarget').value)||0;
  if(!name||!target){alert('Completa nombre y valor objetivo');return;}
  const data={name,target,unit:$('objUnit').value.trim()||'',color:pickedColor||'#74AAFF',icon:'goal'};
  if(id&&id!=='null'){const obj=db.objectives[period].find(x=>x.id===id);if(obj)Object.assign(obj,data);}
  else{db.objectives[period].push(Object.assign({id:uid()},data));}
  await persistDB();closeModalNow();render();
}
async function delObj(id,period){
  if(!confirm('¿Eliminar este objetivo?'))return;
  db.objectives[period]=db.objectives[period].filter(x=>x.id!==id);
  await persistDB();render();
}

function openObjDetail(id,period){
  const obj=(db.objectives[period]||[]).find(x=>x.id===id);
  if(!obj)return;
  const cm=curMonth(),cy=new Date().getFullYear();
  const qNum=Math.floor((new Date().getMonth())/3)+1;
  const qStart=cy+'-'+String((qNum-1)*3+1).padStart(2,'0');
  const qMonths=[0,1,2].map(i=>shiftYM(qStart,i));
  // Valor actual (reusa misma logica)
  function val(o){
    if(o.unit==='€'){
      if(period==='monthly')return monthRevenue(cm);
      if(period==='quarterly')return qMonths.reduce((a,m)=>a+monthRevenue(m),0);
      if(period==='annual')return lastMonths(12).reduce((a,m)=>a+monthRevenue(m),0);
    }
    if(o.name.toLowerCase().includes('cliente'))return db.clients.filter(c=>c.status==='active').length;
    if(o.name.toLowerCase().includes('lead')){
      if(o.name.toLowerCase().includes('cerrado')||o.name.toLowerCase().includes('ganado'))return db.leads.filter(l=>l.stage==='Ganado'&&(l.date||cm)===cm).length;
      return db.leads.filter(l=>(l.date||cm)===cm).length;
    }
    if(o.name.toLowerCase().includes('mrr'))return db.clients.filter(c=>c.status==='active').reduce((a,b)=>a+(b.retainer||0),0);
    return 0;
  }
  const current=val(obj);
  const pct=Math.min(Math.round(current/obj.target*100),100);
  const color=pct>=100?'#3ECF8E':pct>=60?'#F5C147':'#F47174';

  // Construir progreso diario: desde dia 1 del periodo hasta hoy
  // Para ingresos usamos los incomes con fecha; para lo demas, distribución acumulada estimada
  const hoy=new Date();
  let inicio;
  if(period==='monthly'){inicio=new Date(hoy.getFullYear(),hoy.getMonth(),1);}
  else if(period==='quarterly'){inicio=new Date(hoy.getFullYear(),(qNum-1)*3,1);}
  else{inicio=new Date(hoy.getFullYear(),0,1);}
  const dias=[];
  let d=new Date(inicio);
  while(d<=hoy){dias.push(new Date(d));d.setDate(d.getDate()+1);}
  // Limitar a ~30 puntos para no saturar
  const step=Math.max(1,Math.ceil(dias.length/30));
  const data=[];
  dias.forEach((dia,i)=>{
    if(i%step!==0 && i!==dias.length-1)return;
    const dk=dia.toISOString().slice(0,10);
    let acumulado=0;
    if(obj.unit==='€'){
      acumulado=(db.incomes||[]).filter(inc=>{
        // sumar ingresos cuyo mes <= mes del dia (aprox, ya que incomes son por mes)
        return inc.date<=dk.slice(0,7);
      }).reduce((a,b)=>a+b.amount,0);
      // si es mensual, solo el mes actual
      if(period==='monthly')acumulado=(db.incomes||[]).filter(inc=>inc.date===cm).reduce((a,b)=>a+b.amount,0);
    } else {
      // progreso lineal estimado hacia el valor actual
      acumulado=Math.round(current*((i+1)/dias.length));
    }
    data.push({label:dia.getDate()+'/'+(dia.getMonth()+1),value:acumulado});
  });

  modal(`<div class="modal wide">
    <h3>${ic('goal',18)}${esc(obj.name)}</h3>
    <div style="display:flex;gap:16px;align-items:center;margin-bottom:16px;flex-wrap:wrap">
      <div style="font-family:var(--font-num);font-size:32px;font-weight:600;color:${color}">${pct}%</div>
      <div>
        <div style="font-family:var(--font-num);font-size:18px;font-weight:600">${obj.unit==='€'?eur(current):current+(obj.unit||'')}</div>
        <div style="font-size:12px;color:var(--txt-3)">de ${obj.unit==='€'?eur(obj.target):obj.target+(obj.unit||'')} objetivo</div>
      </div>
      <div style="margin-left:auto">
        ${pct>=100?'<span style="background:rgba(62,207,142,.15);color:#3ECF8E;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700">Conseguido</span>':'<span style="background:rgba(245,193,71,.15);color:#F5C147;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600">En progreso</span>'}
      </div>
    </div>
    <div class="chart-card" style="margin-bottom:0">
      <div class="ch-head"><span class="ch-title">Progreso diario</span><span class="mini">${period==='monthly'?ymLabel(cm):period==='quarterly'?'T'+qNum+' '+cy:cy}</span></div>
      ${lineChart(data,{series:[{key:'value',color:obj.color||'#74AAFF',label:'Progreso'}],h:220})}
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModalNow()">Cerrar</button>
    </div>
  </div>`);
}

  const events=[];
  db.clients.forEach(c=>{
    (c.meetings||[]).forEach(m=>{
      events.push({date:m.date,time:m.time||'10:00',title:'Reunión · '+c.name,sub:m.notes||'',color:c.color,type:'client',id:m.id,clientId:c.id,link:m.link||'',attachments:m.attachments||[]});
    });
  });
  db.leads.filter(l=>l.stage==='Reunión'&&l.meetingDate).forEach(l=>{
    events.push({date:l.meetingDate,time:l.meetingTime||'10:00',title:'Demo · '+l.name,sub:l.notes||'',color:STAGE_COL['Reunión'],type:'lead',id:l.id,link:l.meetingLink||''});
  });
  return events.sort((a,b)=>a.date<b.date?-1:1);
}

function calDayClick(date){
  const evs=gatherAllEvents().filter(e=>e.date===date);

function addToGoogleCalendar(meetingId){
  const events=gatherAllEvents();const e=events.find(x=>x.id===meetingId);if(!e)return;
  const dt=e.date.replace(/-/g,'');const tm=(e.time||'10:00').replace(':','')+'00';
  const dtEnd=dt+'T'+String(parseInt(tm.slice(0,2))+1).padStart(2,'0')+tm.slice(2);
  const url=`https://calendar.google.com/calendar/r/eventedit?text=${encodeURIComponent(e.title)}&dates=${dt}T${tm}/${dtEnd}&details=${encodeURIComponent(e.sub||'')}${e.link?'&location='+encodeURIComponent(e.link):''}`;
  window.open(url,'_blank');
  toast('Redirigiendo a Google Calendar...','info');
}

function viewCalendario(){
  const events=gatherAllEvents();
  const today=dayKey();
  const y=calYear,m=calMonth;
  const firstDay=(new Date(y,m,1).getDay()+6)%7;
  const daysInMonth=new Date(y,m+1,0).getDate();
  const monthName=new Date(y,m,1).toLocaleDateString('es-ES',{month:'long',year:'numeric'});
  const byDate={};
  events.forEach(e=>{if(!byDate[e.date])byDate[e.date]=[];byDate[e.date].push(e);});
  const upcoming=events.filter(e=>e.date>=today).slice(0,10);
  let cells='';
  for(let i=0;i<firstDay;i++)cells+='<div></div>';
  for(let d=1;d<=daysInMonth;d++){
    const ds=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const isToday=ds===today;const dFromNow=daysUntil(ds);
    const evs=byDate[ds]||[];
    const isSoon=dFromNow!==null&&dFromNow>=0&&dFromNow<=2&&evs.length>0;
    cells+=`<div class="cal-day${isToday?' cal-today':''}${evs.length?' cal-has-ev':''}${isSoon?' cal-soon':''}" onclick="calDayClick('${ds}')" style="${isSoon?'background:rgba(245,193,71,.08);border:1px solid rgba(245,193,71,.3)':''}">
      <div class="cal-num">${d}</div>
      <div class="cal-dots">${evs.slice(0,3).map(e=>`<span class="cal-dot" style="background:${e.color}"></span>`).join('')}</div>
      ${evs.slice(0,1).map(e=>`<div class="cal-ev-label">${esc(e.title.replace('Reunión · ','').replace('Demo · ',''))}</div>`).join('')}
    </div>`;
  }
  return`
    <div class="row-head" style="margin-top:10px">
      <h2>Calendario</h2>
      <div style="display:flex;gap:6px;align-items:center">
        <button class="btn btn-ghost btn-sm" onclick="calNav(-1)">${svg('back',14)}</button>
        <span style="font-size:13px;font-weight:600;text-transform:capitalize;min-width:150px;text-align:center">${monthName}</span>
        <button class="btn btn-ghost btn-sm" style="transform:scaleX(-1)" onclick="calNav(1)">${svg('back',14)}</button>
      </div>
    </div>
    <div class="panel" style="margin-bottom:14px">
      <div class="cal-grid">
        ${['L','M','X','J','V','S','D'].map(d=>`<div class="cal-head">${d}</div>`).join('')}
        ${cells}
      </div>
    </div>
    <div class="row-head"><h2>Próximas reunis</h2><span class="meta">${upcoming.length} eventos</span></div>
    <div class="tlist">
      ${upcoming.length?upcoming.map(e=>{
        const d=daysUntil(e.date);
        const isSoon=d!==null&&d<=2;
        return`<div class="titem${isSoon?' upcoming-task':''}">
          <div class="prio" style="background:${e.color};min-height:34px"></div>
          <div class="tbody">
            <div class="ttext">${esc(e.title)}</div>
            <div class="tsub">
              <span>${new Date(e.date+'T12:00').toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'})} · ${e.time||'10:00'}h</span>
              ${e.sub?`<span>${esc(e.sub)}</span>`:''}
            </div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
            <span class="pill pill-cli">${e.type==='lead'?'Lead':'Cliente'}</span>
            ${isSoon?`<span class="cal-upcoming-badge">${d===0?'HOY':d===1?'Mañana':'2 días'}</span>`:''}
          </div>
        </div>`;
      }).join(''):'<div class="empty">'+ic('calendar',30)+'<div>Sin reunis próximas</div></div>'}
    </div>`;
}

function renderTaskActive(){
  const today=dayKey(),weekEnd=shiftDay(today,7);
  const filtered=db.tasks.filter(t=>{
    if(taskFilter==='pending')return!t.d;
    if(taskFilter==='d')return t.d;
    if(taskFilter==='today')return!t.d&&t.due===today;
    if(taskFilter==='week')return!t.d&&t.due&&t.due>=today&&t.due<=weekEnd;
    return true;
  }).slice(0,60);
  if(!filtered.length)return'<div class="empty">'+ic('check',30)+'<div>Sin tareas en esta vista</div></div>';
  return`<div class="tlist">${filtered.map(t=>{
    const isAlert=t.isAlert,crit=t.crit;
    const isSoon=!t.d&&t.due&&daysUntil(t.due)<=2&&daysUntil(t.due)>=0;
    let dueHtml='';
    if(t.due&&!t.d){
      const d=daysUntil(t.due);
      dueHtml=`<span class="${d<0?'due-over':d<=2?'due-soon':''}">${d<0?'Vencida hace '+Math.abs(d)+' días':d===0?'Hoy':d===1?'Mañana':'En '+d+' días'}</span>`;
    }
    return`<div class="titem${t.d?' d':''}${crit?' alert-crit':''}${isSoon?' upcoming-task':''}">
      ${!isAlert?`<div class="tcheck${t.d?' on':''}" onclick="toggleTask(${t.id})">${t.d?ic('checks',14):''}</div>`:''}
      <div class="prio prio-${crit?'crit':t.prio}"></div>
      <div class="tbody">
        <div class="ttext">${esc(t.text)}</div>
        <div class="tsub">
          ${t.cli&&t.cli!==0?`<span style="color:${cliColor(t.cli)}">${esc(cliName(t.cli))}</span>`:''}
          ${dueHtml}
        </div>
      </div>
      <div class="tmeta">
        <span class="pill pill-${crit?'crit':t.prio}">${crit?'ALERTA':t.prio.charAt(0).toUpperCase()+t.prio.slice(1)}</span>
        <span class="tdel" onclick="delTask(${t.id})">${ic('trash',14)}</span>
      </div>
    </div>`;
  }).join('')}</div>`;
}

/* ============ VIEW: NOTAS (por día) ============ */
function viewNotas(){
  const notas=(db.dayNotes||[]).slice().sort((a,b)=>b.date.localeCompare(a.date)||b.id-a.id);
  // Agrupar por fecha
  const grupos={};
  notas.forEach(n=>{(grupos[n.date]=grupos[n.date]||[]).push(n);});
  const fechas=Object.keys(grupos).sort((a,b)=>b.localeCompare(a));
  const hoy=dayKey();
  function fechaLabel(f){
    if(f===hoy)return 'Hoy';
    const ayer=shiftDay(hoy,-1);if(f===ayer)return 'Ayer';
    return new Date(f+'T12:00').toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'});
  }
  return `
    <div class="row-head" style="margin-top:10px"><h2>Notas</h2>
      <button class="btn btn-primary btn-sm" onclick="openNotaModal()">${ic('plus',15)}Nueva nota</button>
    </div>
    <div class="panel" style="margin-bottom:14px">
      <div style="display:flex;gap:9px">
        <input id="notaQuick" type="text" placeholder="Escribe una nota rápida y pulsa Enter...">
        <button class="btn btn-primary btn-sm" onclick="addQuickNota()">${ic('plus',14)}</button>
      </div>
    </div>
    ${fechas.length?fechas.map(f=>`
      <div class="nota-dia">
        <div class="nota-dia-head">${fechaLabel(f)}</div>
        ${grupos[f].map(n=>`<div class="nota-item" style="border-left-color:${n.color||'#74AAFF'}">
          <div class="nota-text">${esc(n.text)}</div>
          <div class="nota-acts">
            <span class="tdel" onclick="editNota(${n.id})">${ic('edit',14)}</span>
            <span class="tdel" onclick="delNota(${n.id})">${ic('trash',14)}</span>
          </div>
        </div>`).join('')}
      </div>`).join(''):'<div class="panel"><div class="empty">'+ic('fileText',32)+'<div>Sin notas todavía. Empieza escribiendo arriba.</div></div></div>'}
  `;
}
async function addQuickNota(){
  const inp=$('notaQuick');const text=inp?inp.value.trim():'';if(!text)return;
  db.seq=(db.seq||300)+1;
  db.dayNotes=db.dayNotes||[];
  db.dayNotes.unshift({id:db.seq,text,date:dayKey(),color:'#74AAFF',createdAt:Date.now()});

function waNormalize(ph){
  let p=(ph||'').replace(/[^0-9+]/g,'');
  if(p.startsWith('+'))p=p.slice(1);
  else if(p.startsWith('00'))p=p.slice(2);
  else if(p.length===9)p='34'+p; // España por defecto
  return p;
}
function sendWhatsAppLink(leadId){

  if(!l.ph){toast('Este lead no tiene teléfono','warning');return;}
  const link=l.meetLink||'';
  let msg;
  if(link){
    msg=`Hola ${l.name}, soy Modou de M1 Media. Te paso el enlace para nuestra reunión`+
        (l.meetDate?` del ${new Date(l.meetDate+'T12:00').toLocaleDateString('es-ES',{day:'numeric',month:'long'})}`:'')+
        (l.meetTime?` a las ${l.meetTime}h`:'')+`: ${link}`;
  } else {
    msg=`Hola ${l.name}, soy Modou de M1 Media. ¿Hablamos sobre cómo conseguir más clientes para tu negocio?`;
  }
  const url='https://wa.me/'+waNormalize(l.ph)+'?text='+encodeURIComponent(msg);
  window.open(url,'_blank');
  toast('Abriendo WhatsApp...','info');
}

async function saveMeeting(){
  const cliId=parseInt($('mtCli').value);
  const c=db.clients.find(x=>x.id===cliId);if(!c)return;
  const mt={id:uid(),type:$('mtType').value,date:$('mtDate').value,time:$('mtTime').value,
    duration:parseInt($('mtDur').value)||60,link:$('mtLink').value.trim(),
    notes:$('mtNotes').value.trim(),d:false,createdAt:dayKey()};
  c.meetings.push(mt);
  await persistDB();closeModalNow();render();
  toast('Reunión guardada','success');
  // Auto-add to Google Calendar
  const title=encodeURIComponent(`[M1 Media] ${c.name} · ${mt.type}`);
  const dt=mt.date.replace(/-/g,'')+'T'+(mt.time||'10:00').replace(':','')+'00';
  const endH=mt.date.replace(/-/g,'')+'T'+addMinutes(mt.time||'10:00',mt.duration);
  const loc=encodeURIComponent(mt.link||'');
  const notes=encodeURIComponent(mt.notes||'');
  window.open(`https://calendar.google.com/calendar/r/eventedit?text=${title}&dates=${dt}/${endH}&location=${loc}&details=${notes}&sf=true`,'_blank');
}
function addMinutes(time,mins){
  const [h,m]=time.split(':').map(Number);
  const total=h*60+m+mins;
  return String(Math.floor(total/60)%24).padStart(2,'0')+String(total%60).padStart(2,'0')+'00';
}

async function saveMetrics(clientId){

  const entry={month,data:{}};

async function addTask(){
  const inp=$('tkInput');const text=inp?inp.value.trim():'';if(!text)return;
  const prio=$('tkPrio')?$('tkPrio').value:'media';
  const due=$('tkDue')?$('tkDue').value:'';
  const cli=$('tkCli')?parseInt($('tkCli').value)||0:0;
  db.tasks.unshift({id:uid(),text,prio,due,cli,d:false,dAt:0,isAlert:false,crit:false,createdAt:dayKey()});
  await persistDB();render();if(inp){inp.value='';inp.focus();}
}
async function toggleTask(id){
  const t=db.tasks.find(x=>x.id===id);if(!t)return;
  t.d=!t.d;t.done=t.d;t.dAt=t.d?Date.now():0;t.doneAt=t.dAt;
  await persistDB();render();
}
async function delTask(id){
  db.tasks=db.tasks.filter(x=>x.id!==id);await persistDB();render();
}
async function purgeOldD(){
  const cutoff=Date.now()-30*86400000;
  db.tasks=db.tasks.filter(t=>!(t.d&&t.dAt&&t.dAt<cutoff));
  await persistDB();render();toast('Tareas completadas antiguas eliminadas','info');
}

/* ============ BUDGET HELPERS ============ */
let budClient=null,budNiche='local',budMarginPct=30,budFilter='all',budSegFilter='all';
function budSetClient(id){budgetState.clientId=id;render();}
function budSetNiche(n){budgetState.niche=n;render();}
function budMargin(v){budgetState.margin=parseInt(v)||30;render();}
function budToggle(key){if(!budgetState.services[key])budgetState.services[key]={};budgetState.services[key].on=!budgetState.services[key].on;render();}
function budPrice(key,v){if(!budgetState.services[key])budgetState.services[key]={};budgetState.services[key].price=parseFloat(v)||0;render();}
function budFilterSeg(s){budSegFilter=s;renderBudgetCalc();}
function budFilterType(t){budFilter=t;renderBudgetCalc();}
function renderBudgetCalc(){render();}

function budgetTotals(){
  let min=0,rec=0,max=0;
  SVC_CATALOG.forEach(s=>{
    const el=document.querySelector(`[data-svc="${s.key}"]`);
    if(!el||el.dataset.on!=='1')return;
    const col=budNiche==='pyme'?s.pyme:budNiche==='premium'?s.premium:s.local;
    min+=col[0];rec+=Math.round((col[0]+col[1])/2);max+=col[1];
  });
  return{min,rec,max};
}

function resolveBudgetEntity(){
  const cid=budgetState.clientId;
  if(!cid||cid==='0'||cid===0)return null;
  if(typeof cid==='string'&&cid[0]==='l'){
    const l=db.leads.find(x=>x.id===parseInt(cid.slice(1)));
    return l?{type:'lead',obj:l}:null;
  }
  const realId=typeof cid==='string'&&cid[0]==='c'?parseInt(cid.slice(1)):parseInt(cid);
  const c=db.clients.find(x=>x.id===realId);
  return c?{type:'client',obj:c}:null;
}
function applyBudgetToClient(){
  const ent=resolveBudgetEntity();
  if(!ent){alert('Selecciona un cliente o lead primero');return;}
  const {rec}=budgetTotals();
  if(ent.type==='lead'){
    if(!confirm(`¿Asignar ${eur(rec)} como valor estimado al lead ${ent.obj.name}?`))return;
    ent.obj.value=rec;
    persistDB();render();toast('Valor del lead actualizado','success');
    return;
  }
  const c=ent.obj;
  if(!confirm(`¿Aplicar ${eur(rec)}/mes como retainer a ${c.name}?`))return;
  c.retainer=rec;
  persistDB();render();toast('Retainer actualizado a '+eur(rec)+'/mes','success');
}

function genProposalFromBudget(){
  const ent=resolveBudgetEntity();
  const {min,rec,max}=budgetTotals();
  if(ent&&ent.type==='client'){
    curTab='clientes';curClient=ent.obj.id;
    render();
    setTimeout(()=>openProposalDoc(ent.obj.id,{budMin:min,budRec:rec,budMax:max}),300);
  } else {
    // Sin cliente asociado o es lead: abrir propuesta genérica editable
    openProposalDoc(null,{budMin:min,budRec:rec,budMax:max,leadName:ent&&ent.type==='lead'?ent.obj.name:''});
  }
}

function notifOncePerDay(key){
  // Devuelve true solo la primera vez que se llama hoy con esta key
  try{
    const today=dayKey();
    const stored=localStorage.getItem('notif_'+key);
    if(stored===today)return false;
    localStorage.setItem('notif_'+key,today);
    return true;
  }catch(e){return true;}
}
function pushNotif(title,body,icon){
  if(Notification.permission!=='granted')return;
  try{new Notification(title,{body,icon:icon||'/favicon-96x96.png',badge:'/favicon-96x96.png',tag:title});}catch(e){}
}

async function sendNotif(title,body,url){
  pushNotif(title,body);
  // OneSignal REST API push (server-side notification to self)
  if(window._oneSignalReady&&typeof OneSignal!=='undefined'){
    try{
      const subId=await OneSignal.User.PushSubscription.id;
      if(subId&&ONESIGNAL_REST_KEY){
        await fetch('https://onesignal.com/api/v1/notifications',{
          method:'POST',
          headers:{'Content-Type':'application/json','Authorization':'Basic '+ONESIGNAL_REST_KEY},
          body:JSON.stringify({
            app_id:ONESIGNAL_APP_ID,
            include_subscription_ids:[subId],
            headings:{es:title,en:title},
            contents:{es:body||title,en:body||title},
            url:url||window.location.href
          })
        });
      }
    }catch(e){console.warn('OneSignal push error:',e);}
  }
}

function checkMeetingAlerts(){
  const now=new Date();
  const today=dayKey();
  const tomorrow=new Date(now);tomorrow.setDate(tomorrow.getDate()+1);
  const tomorrowKey=tomorrow.toISOString().slice(0,10);
  const dayAfter=new Date(now);dayAfter.setDate(dayAfter.getDate()+2);
  const dayAfterKey=dayAfter.toISOString().slice(0,10);

  db.clients.forEach(c=>{
    (c.meetings||[]).filter(m=>!m.d).forEach(m=>{
      if(!m.date)return;
      if(m.date===today){
        if(notifOncePerDay('meet-today-'+m.id)){
          sendNotif('Reunión HOY con '+c.name,(m.type||'Reunión')+' a las '+(m.time||'10:00')+'h');
        }
      } else if(m.date===tomorrowKey){
        if(notifOncePerDay('meet-tomorrow-'+m.id)){
          sendNotif('Reunión mañana con '+c.name,(m.type||'Reunión')+' a las '+(m.time||'10:00')+'h');
        }
      }
    });
  });

  // Lead meetings
  db.leads.filter(l=>l.meetDate&&l.stage!=='Ganado'&&l.stage!=='Perdido').forEach(l=>{
    if(l.meetDate===today||l.meetDate===tomorrowKey||l.meetDate===dayAfterKey){
      if(notifOncePerDay('lead-meet-'+l.id+'-'+l.meetDate)){
        sendNotif('Demo con '+l.name,(l.meetDate===today?'HOY':l.meetDate===tomorrowKey?'Mañana':'En 2 días')+' a las '+(l.meetTime||'10:00')+'h');
      }
    }
  });
}

function scheduleLocalNotifications(){
  checkMeetingAlerts();
  setInterval(checkMeetingAlerts,60000);
  // Daily digest at startup
  const pendingTasks=db.tasks.filter(t=>!t.d&&!t.isAlert&&t.due&&t.due<=dayKey()).length;
  if(pendingTasks>0)setTimeout(()=>sendNotif('⚡ Tareas pendientes',`Tienes ${pendingTasks} tarea(s) vencida(s) hoy`),3000);
}

/* ============ AUTOMATED NOTIFICATIONS ============ */
function checkAutomatedNotifications(){
  // Solo una tanda de notificaciones al día en total
  if(!notifOncePerDay('daily-digest'))return;
  const pending=db.incomes.filter(i=>i.status==='pending');
  if(pending.length>0){
    const tot=pending.reduce((a,b)=>a+b.amount,0);
    sendNotif('Facturas pendientes',pending.length+' cobro(s) pendientes · '+eur(tot)+' por cobrar');
  }
  const overdue=db.tasks.filter(t=>!t.d&&!t.isAlert&&t.due&&t.due<dayKey());
  if(overdue.length>0)sendNotif('Tareas vencidas',overdue.length+' tarea(s) con fecha pasada');
  const in7=new Date();in7.setDate(in7.getDate()+7);const today=dayKey();
  const upcoming=[];
  db.clients.forEach(c=>(c.meetings||[]).filter(m=>!m.d&&m.date>=today&&m.date<=in7.toISOString().slice(0,10)).forEach(m=>upcoming.push({c:c.name,m})));
  if(upcoming.length>0){
    sendNotif('Reuniones próximas',upcoming.length+' reunión(es) en los próximos 7 días');
  }
  const atRisk=db.clients.filter(c=>c.status==='active'&&clientHealth(c)!==null&&clientHealth(c)<40);
  if(atRisk.length>0){
    sendNotif('Cliente en riesgo',atRisk.map(c=>c.name).join(', ')+' con health score bajo');
  }
}

function openClientDetail(id){curClient=id;render();}
function closeClientDetail(){curClient=null;render();}
async function toggleIncomeStatus(id){
  const inc=db.incomes.find(x=>x.id===id);if(!inc)return;
  inc.status=inc.status==='paid'?'pending':'paid';
  await persistDB();render();toast(inc.status==='paid'?'Marcado como cobrado':'Marcado como pendiente','success');
}
async function editMetricEntry(clientId,month,scope){
  const c=db.clients.find(x=>x.id===clientId);if(!c)return;
  const entry=c.metricLog.find(l=>l.month===month&&(l.scope||'General')===scope);if(!entry)return;
  const defs=METRICS[c.service]||[];
  modal(`<div class="modal wide">
    <h3>${ic('chart',18)}Editar métricas — ${esc(c.name)} · ${ymLabel(month)}</h3>
    <div class="form-grid">
      ${defs.map(m=>`<div class="field"><label>${esc(m.n)}</label><input id="me_${m.k}" type="number" value="${entry.values[m.k]||0}" step="0.01"></div>`).join('')}
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModalNow()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveMetricEdit(${clientId},'${month}','${scope}')">Guardar</button>
    </div>
  </div>`);
}
async function saveMetricEdit(clientId,month,scope){
  const c=db.clients.find(x=>x.id===clientId);if(!c)return;
  const entry=c.metricLog.find(l=>l.month===month&&(l.scope||'General')===scope);if(!entry)return;
  const defs=METRICS[c.service]||[];
  defs.forEach(m=>{const el=$('me_'+m.k);if(el)entry.values[m.k]=parseFloat(el.value)||0;});
  await persistDB();closeModalNow();render();toast('Métricas actualizadas','success');
}
async function deleteMetricEntry(clientId,month,scope){
  if(!confirm('¿Eliminar estas métricas?'))return;
  const c=db.clients.find(x=>x.id===clientId);if(!c)return;
  c.metricLog=c.metricLog.filter(l=>!(l.month===month&&(l.scope||'General')===scope));
  await persistDB();render();toast('Métricas eliminadas','info');
}
function budgetForClient(clientId){
  budgetState.clientId=clientId;curTab='presupuestos';render();
}


function initDragDrop(){
  document.querySelectorAll('.lead-card').forEach(card=>{
    card.ondragstart=e=>{e.dataTransfer.setData('leadId',card.dataset.id);card.classList.add('dragging');};
    card.ondragend=()=>card.classList.remove('dragging');
  });
  document.querySelectorAll('.pipe-col-body').forEach(col=>{
    col.ondragover=e=>{e.preventDefault();col.closest('.pipe-col').classList.add('dragover');};
    col.ondragleave=()=>col.closest('.pipe-col').classList.remove('dragover');
    col.ondrop=async e=>{
      e.preventDefault();col.closest('.pipe-col').classList.remove('dragover');
      const id=parseInt(e.dataTransfer.getData('leadId'));
      const stage=col.dataset.stage;
      if(id&&stage)await moveLead(id,stage);
    };
  });
}
